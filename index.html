<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; min-height: 100vh; }

  .app-header { background: #ffffff; padding: 20px 30px; display:flex; align-items:center; gap:15px; border-bottom: 2px solid #cccccc; }
  .app-header h1 { font-size: 22px; color: #666666; }
  .app-header span { color: #999999; font-size: 13px; }

  .container { display: grid; grid-template-columns: 410px 1fr; gap: 0; height: calc(100vh - 70px); }

  .form-panel { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
  .form-panel h2 { color: #e74c3c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f3460; border: 1px solid #1a4a80; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e74c3c; }

  .items-section { margin-top: 10px; }
  .item-row { background: #0a1628; border: 1px solid #1a4a80; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
  .item-row h4 { color: #e74c3c; font-size: 12px; margin-bottom: 8px; }
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-grid .full { grid-column: 1/-1; }
  .item-grid input, .item-grid select { width:100%; background:#16213e; border:1px solid #1a4a80; color:#eee; padding:6px 8px; border-radius:4px; font-size:12px; }
  
  /* Multi-size sub-grid inside the form items (Width, Length, Height, Quantity) */
  .sizes-container { background: #0f3460; padding: 8px; border-radius: 4px; margin-top: 4px; display: none; }
  .sizes-title { font-size: 10px; color: #ffb4a2; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
  .size-row { display: grid; grid-template-columns: 20px 1fr 10px 1fr 10px 1fr 20px 1fr; align-items: center; gap: 4px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
  .size-row input { text-align: center; padding: 4px 2px !important; }

  .calc-result { background: #0f3460; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #4ecca3; margin-top: 6px; line-height: 1.4; }

  .btn-add { width:100%; background: #0f3460; border: 1px dashed #e74c3c; color: #e74c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 5px; }
  .btn-add:hover { background: #e74c3c; color: white; }
  .btn-glass-room { width:100%; background: linear-gradient(135deg, #16a085, #1abc9c); color:white; border:none; padding: 9px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: bold; }
  .btn-glass-room:hover { background: linear-gradient(135deg, #1abc9c, #16a085); }
  .btn-remove { position:absolute; top:8px; right:8px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px; }

  .btn-generate { width:100%; background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; border:none; padding: 12px; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; margin-top:15px; }
  .btn-generate:hover { background: linear-gradient(135deg, #c0392b, #962d22); }

  .preview-panel { background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #ddd; }
  .preview-toolbar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-whatsapp { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .btn-print { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }

  /* QUOTATION DOC PAGES */
  .quotation-page { background: white; width: 820px; min-height: 1080px; height: auto; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: Arial, sans-serif; color: #222; position: relative; margin-bottom: 25px; box-sizing: border-box; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; position: relative; z-index: 1; }
  table th { background: #c0392b; color: white; padding: 10px 8px; text-align: left; }
  table th:last-child { text-align: right; }
  table td { padding: 8px 10px; border: 1px solid #ddd; vertical-align: top; }
  table tr:nth-child(even) td { background: #fdf5f5; }
  .total-row td { font-weight: bold; background: #fdf5f5 !important; border-top: 2px solid #c0392b; }
  .total-row td:last-child { color: #c0392b; font-size: 14px; text-align: right; }

  /* Item name bold, description below */
  .item-name { font-weight: bold; font-size: 12px; color: #111; display: block; margin-bottom: 4px; }
  .item-desc { font-size: 11px; color: #555; line-height: 1.4; display: block; }

  .amount-words { background: #fdf5f5; border: 1px solid #c0392b; padding: 10px 14px; font-size: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; position: relative; z-index: 1; }
  .doc-section-title { color: #c0392b; font-weight: bold; font-size: 13px; margin: 15px 0 8px; position: relative; z-index: 1; }
  .doc-list { list-style: none; font-size: 12px; line-height: 2; position: relative; z-index: 1; }
  .doc-list li::before { content: '✓ '; color: #c0392b; font-weight: bold; }
  .client-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 13px; position: relative; z-index: 1; }
  .section-label { font-size: 11px; text-transform: uppercase; color: #999; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 6px; }
  
  /* Bank cards stacked vertically for high legibility */
  .bank-grid-vertical { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; margin-top: 10px; }
  .bank-card { background: #fdf5f5; border: 1px solid #e0c0c0; padding: 12px 16px; font-size: 12px; line-height: 1.8; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  .bank-card strong { color: #c0392b; font-size: 13px; display: block; margin-bottom: 2px; }
  .bank-iban { font-size: 12px; font-weight: bold; color: #111; letter-spacing: 0.5px; }

  /* CSS Watermark Overlay */
  .watermark-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 0; overflow: hidden; }
  .watermark-text { font-family: Arial, sans-serif; font-size: 55px; font-weight: 900; color: rgba(192, 57, 43, 0.035); text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; letter-spacing: 5px; }

  @media print {
    @page {
      size: A4;
      margin: 0 !important; /* Strip default browser headers & URLs */
    }
    body { background: white !important; margin: 0 !important; padding: 0 !important; }
    .app-header, .form-panel, .preview-toolbar, .page-break-divider { display: none !important; }
    .container { display: block !important; width: 100% !important; }
    .preview-panel { padding: 0 !important; margin: 0 !important; background: white !important; width: 100% !important; }
    .quotation-page {
      box-shadow: none !important;
      border: none !important;
      width: 100% !important;
      height: auto !important;
      min-height: 297mm !important;
      padding: 20mm 15mm 15mm 15mm !important; /* Margins to protect structural contents from clipping */
      margin: 0 !important;
      page-break-after: always !important;
    }
    .quotation-page:last-of-type { page-break-after: avoid !important; }
  }
  .page-break-divider { text-align:center; color:#888; font-size:11px; font-weight: bold; padding: 10px 0; letter-spacing:2px; text-transform: uppercase; }
</style>
</head>
<body>

<datalist id="itemNamesDatalist"></datalist>

<div class="app-header">
  <div>
    <h1>🏢 Ahmad Aluminium & Glass Cont</h1>
    <span>#1 Aluminium & Glass Cont UAE — Quotation/Invoice System</span>
  </div>
</div>

<div class="container">
  <!-- FORM PANEL -->
  <div class="form-panel" id="formPanel">
    
    <!-- CLOUD STATUS SECTION -->
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 15px;">
      <label style="color: #4ecca3; font-weight: bold; font-size: 11px; margin-bottom: 4px; display: block; letter-spacing: 1px;">☁️ Cloud Database Status</label>
      <div id="syncStatus" style="font-size: 12px; color: #4ecca3; font-weight: bold;">☁️ Connected & Synced</div>
    </div>

    <!-- RECENT QUOTATIONS DIRECTORY -->
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 20px;">
      <label style="color: #3498db; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">🔍 Recent Documents Directory</label>
      <input type="text" id="searchQuotes" placeholder="Type to search client, reference, or subject..." oninput="filterRecentQuotes()" style="margin-bottom: 8px; font-size: 11px;">
      <div id="recentQuotesList" style="max-height: 120px; overflow-y: auto; background: #0f3460; border-radius: 4px; padding: 5px; font-size: 11px; color: #eee; border: 1px solid #1a4a80; line-height: 1.4;">
        <div style="text-align: center; color: #888; padding: 10px;">Connect Web App to view history</div>
      </div>
      <button onclick="fetchRecentQuotes()" style="width: 100%; margin-top: 8px; background: #3498db; color: white; border: none; padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;">🔄 Refresh Directory</button>
    </div>

    <h2>📋 Document Setup</h2>

    <!-- WORK TYPE AUTO SELECTOR (DYNAMIC) -->
    <div class="form-group">
      <label>⚙️ Work Type Category</label>
      <select id="workTypeSelector" onchange="onWorkTypeChange(this.value)">
        <option value="Custom">Custom / Manual Input</option>
      </select>
    </div>

    <!-- DOCUMENT TYPE SWITCHER -->
    <div class="form-group">
      <label>📑 Document Format Layout</label>
      <select id="documentMode" onchange="updateFormVisibility(); generateQuotation(); triggerSilentCloudSave();">
        <option value="Quotation">Standard Quotation</option>
        <option value="Invoice">Tax Invoice (With Advance / No Sizes)</option>
      </select>
    </div>

    <div class="form-group" style="display: flex; gap: 10px; justify-content: space-between; align-items: flex-end;">
      <div style="flex: 1;">
        <label>Document Reference Number</label>
        <input type="text" id="quotRef" readonly style="background:#0e1726; color:#888; cursor:not-allowed;" placeholder="AA-2026-201">
      </div>
      <button onclick="clearDraft()" style="background: #e74c3c; color: white; border: none; padding: 9px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; height: 34px;">🧹 Clear Form</button>
    </div>
    
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="quotDate">
    </div>
    <div class="form-group">
      <label>Client Address</label>
      <input type="text" id="clientAddr" placeholder="Al Sufouh, Dubai - UAE">
    </div>
    <div class="form-group">
      <label>Client Phone</label>
      <input type="text" id="clientPhone" placeholder="+971 58 849 0784">
    </div>
    <div class="form-group">
      <label>Client Email</label>
      <input type="text" id="clientEmail" placeholder="NA">
    </div>
    <div class="form-group">
      <label>Subject / Work Type (Editable)</label>
      <input type="text" id="subject" placeholder="Supply & Installation of Glass Room Work">
    </div>

    <!-- VAT TOGGLE -->
    <div class="form-group">
      <label>Tax Settings</label>
      <select id="vatToggle" onchange="generateQuotation(); triggerSilentCloudSave();">
        <option value="no">No VAT (Default)</option>
        <option value="yes">Add 5% UAE VAT</option>
      </select>
    </div>

    <!-- INVOICE CUSTOM AMOUNTS INTERFACE (Hides during Quotation mode) -->
    <div id="invoiceAmountsContainer" style="display: none; background: rgba(231, 76, 60, 0.08); padding: 12px; border-radius: 6px; border: 1px solid rgba(231, 76, 60, 0.25); margin-bottom: 15px;">
      <label style="color: #ffb4a2; font-weight: bold; font-size: 11px; display: block; margin-bottom: 8px;">💵 Invoice Particulars & Amounts (AED)</label>
      
      <div style="border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px;">
        <label style="font-size: 9px;">Line #1 Particulars</label>
        <input type="text" id="invPart1" placeholder="e.g. Aluminium Segments Installation" style="margin-bottom: 4px;">
        <label style="font-size: 9px;">Line #1 Amount (AED)</label>
        <input type="number" id="invAmt1" placeholder="0" oninput="generateQuotation(); triggerSilentCloudSave();">
      </div>

      <div style="border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px;">
        <label style="font-size: 9px;">Line #2 Particulars</label>
        <input type="text" id="invPart2" placeholder="e.g. Double Glass Section Setup" style="margin-bottom: 4px;">
        <label style="font-size: 9px;">Line #2 Amount (AED)</label>
        <input type="number" id="invAmt2" placeholder="0" oninput="generateQuotation(); triggerSilentCloudSave();">
      </div>

      <div style="border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px;">
        <label style="font-size: 9px;">Line #3 Particulars</label>
        <input type="text" id="invPart3" placeholder="e.g. Roof Insulations Work" style="margin-bottom: 4px;">
        <label style="font-size: 9px;">Line #3 Amount (AED)</label>
        <input type="number" id="invAmt3" placeholder="0" oninput="generateQuotation(); triggerSilentCloudSave();">
      </div>

      <div>
        <label style="font-size: 9px;">Line #4 Particulars</label>
        <input type="text" id="invPart4" placeholder="Optional particulars" style="margin-bottom: 4px;">
        <label style="font-size: 9px;">Line #4 Amount (AED)</label>
        <input type="number" id="invAmt4" placeholder="0" oninput="generateQuotation(); triggerSilentCloudSave();">
      </div>
    </div>

    <!-- PARAMETRIC SMART ESTIMATOR PANEL (In Centimeters - Hidden on Invoice Mode) -->
    <div id="smartEstimatorPanel" class="form-group" style="background: rgba(22, 160, 133, 0.15); padding: 12px; border-radius: 6px; border: 1px solid #1abc9c; margin-top: 15px; margin-bottom: 15px;">
      <label style="color: #1abc9c; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">📐 Smart Room Estimator (In Centimeters)</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;">
        <div>
          <label style="font-size: 9px;">Width (cm)</label>
          <input type="number" id="globalWidth" value="400" placeholder="e.g. 400" style="background: #16213e; text-align: center;">
        </div>
        <div>
          <label style="font-size: 9px;">Length (cm)</label>
          <input type="number" id="globalLength" value="500" placeholder="e.g. 500" style="background: #16213e; text-align: center;">
        </div>
        <div>
          <label style="font-size: 9px;">Height (cm)</label>
          <input type="number" id="globalHeight" value="300" placeholder="e.g. 300" style="background: #16213e; text-align: center;">
        </div>
      </div>
      <button class="btn-glass-room" style="margin-top: 0;" onclick="applySmartEstimator()">⚡ Apply Estimator Formulas</button>
    </div>

    <h2 id="itemsHeading" style="margin-top:20px;">🔧 Line Items</h2>
    <div class="items-section" id="itemsContainer"></div>
    <button class="btn-add" onclick="addItem()">+ Add Custom Item</button>

    <button class="btn-generate" onclick="generateQuotation(); triggerSilentCloudSave();">⚡ Generate Quotation & Sketch</button>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download / Print PDF</button>
      <button class="btn-whatsapp" onclick="shareToWhatsApp()">💬 Share to WhatsApp</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc">
      <div style="text-align:center; color:#999; padding:80px 0; font-size:16px;">
        Fill the form and click <strong style="color:#e74c3c">Generate Quotation</strong>
      </div>
    </div>
  </div>
</div>

<script>

// Core Spreadsheet & Apps Script Targets
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNizzL9Im6qMmjEcuOhH5404-GMIJDXqSuGw3xrZQARxk1sJhTIkVqT8C2AwvchDHbysmB-oftQ3Sk/pub?output=csv";

let parsedLibrary = {};
let hasEstimatorBeenRun = false;
let flatItemLibrary = {};

// ─── OFFLINE BACKUP LIBRARY ────────────────────────────────────────────────
const ITEM_LIBRARY = {
  'Structure': { desc: 'Supply & installation of Juton powder coated 100mm × 100mm, 2mm thick aluminium tube frame for roof and pillars.', rate: 1200, formula: 'W*L' },
  'Swing Door': { desc: 'Supply & installation of Juton powder coated 4.5cm aluminium frame swing door with double glass (6mm tempered clear + 12mm air spacer + 6mm tempered clear glass).', rate: 2500, formula: 'fixed' },
  '3 Side Closing with Cement Board & Gypsum': { desc: 'Supply & installation of outside cement board, inside gypsum board with GI channel, wall construction and white paint finishing.', rate: 400, formula: '((2*L)+W)*H - 2' },
  'Sandwich Panel Roof': { desc: 'Supply & installation of 9cm thick sandwich panel roof with sheets on both sides and insulation foam inside, 10cm slope for drainage, 100% waterproofing.', rate: 450, formula: 'W*L' },
  'Gypsum Ceiling': { desc: 'Supply & installation of GI channel frame for gypsum board ceiling with white paint finishing.', rate: 120, formula: 'W*L' },
  'Electric': { desc: 'Supply & installation of spot lights in gypsum board ceiling and power sockets as required.', rate: 1500, formula: 'fixed' },
  'AC': { desc: 'Supply & installation of 1.5 Ton Samsung or Super General AC with up to 3m copper pipe connection and power supply installation.', rate: 3500, formula: 'fixed' }
};

const DEFAULT_TERMS = `• 60% Advance Payment.
• 30% on all material delivery on site before installation.
• 10% after Completion.
• 5% VAT is calculated on final invoices according to official tax policy.
• Validity of This Offer for 07 Days Only.`;

// ─── VISIBILITY CONTROL ───────────────────────────────────────────────────
function updateFormVisibility() {
  const mode = document.getElementById('documentMode').value;
  const isInvoice = (mode === 'Invoice');

  document.getElementById('smartEstimatorPanel').style.display = isInvoice ? 'none' : 'block';
  document.getElementById('itemsHeading').style.display = isInvoice ? 'none' : 'block';
  document.getElementById('itemsContainer').style.display = isInvoice ? 'none' : 'block';
  document.querySelector('.btn-add').style.display = isInvoice ? 'none' : 'block';
  document.getElementById('workTypeSelector').closest('.form-group').style.display = isInvoice ? 'none' : 'block';
  
  document.getElementById('invoiceAmountsContainer').style.display = isInvoice ? 'block' : 'none';
}

// ─── DATE AUTOFILL ENGINE ──────────────────────────────────────────────────
function setTodayDate() {
  const dateInput = document.getElementById('quotDate');
  if (dateInput && !dateInput.value) {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2
