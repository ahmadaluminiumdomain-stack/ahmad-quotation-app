<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; min-height: 100vh; }

  .app-header { background: #ffffff; padding: 20px 30px; display:flex; align-items:center; gap:15px; border-bottom: 2px solid #cccccc; }
  .app-header h1 { font-size: 22px; color: #666666; }
  .app-header span { color: #999999; font-size: 13px; }

  .container { display: grid; grid-template-columns: 410px 1fr; gap: 0; height: calc(100vh - 70px); }

  .form-panel { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
  .form-panel h2 { color: #e74c3c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f3460; border: 1px solid #1a4a80; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e74c3c; }

  .items-section { margin-top: 10px; }
  .item-row { background: #0a1628; border: 1px solid #1a4a80; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
  .item-row h4 { color: #e74c3c; font-size: 12px; margin-bottom: 8px; }
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-grid .full { grid-column: 1/-1; }
  .item-grid input, .item-grid select { width:100%; background:#16213e; border:1px solid #1a4a80; color:#eee; padding:6px 8px; border-radius:4px; font-size:12px; }
  
  .sizes-container { background: #0f3460; padding: 8px; border-radius: 4px; margin-top: 4px; display: none; }
  .size-row { display: grid; grid-template-columns: 20px 1fr 15px 1fr 25px 1fr; align-items: center; gap: 4px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
  .size-row input { text-align: center; padding: 4px 2px !important; }

  .calc-result { background: #0f3460; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #4ecca3; margin-top: 6px; line-height: 1.4; }

  .btn-add { width:100%; background: #0f3460; border: 1px dashed #e74c3c; color: #e74c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 5px; }
  .btn-add:hover { background: #e74c3c; color: white; }
  .btn-glass-room { width:100%; background: linear-gradient(135deg, #16a085, #1abc9c); color:white; border:none; padding: 9px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: bold; }
  
  .btn-remove { position:absolute; top:8px; right:8px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px; }

  .btn-generate { width:100%; background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; border:none; padding: 12px; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; margin-top:15px; }

  .preview-panel { background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #ddd; }
  .preview-toolbar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-whatsapp { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .btn-print { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }

  .quotation-page { background: white; width: 820px; min-height: 1080px; height: auto; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: Arial, sans-serif; color: #222; position: relative; margin-bottom: 25px; box-sizing: border-box; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; position: relative; z-index: 1; }
  table th { background: #c0392b; color: white; padding: 10px 8px; text-align: left; }
  table td { padding: 8px 10px; border: 1px solid #ddd; vertical-align: top; }
  table tr:nth-child(even) td { background: #fdf5f5; }

  .amount-words { background: #fdf5f5; border: 1px solid #c0392b; padding: 10px 14px; font-size: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; position: relative; z-index: 1; }
  .doc-section-title { color: #c0392b; font-weight: bold; font-size: 13px; margin: 15px 0 8px; position: relative; z-index: 1; }
  .doc-list { list-style: none; font-size: 12px; line-height: 2; position: relative; z-index: 1; }
  .doc-list li::before { content: '✓ '; color: #c0392b; font-weight: bold; }
  .client-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 13px; position: relative; z-index: 1; }
  
  .watermark-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 0; overflow: hidden; }
  .watermark-text { font-family: Arial, sans-serif; font-size: 55px; font-weight: 900; color: rgba(192, 57, 43, 0.035); text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; letter-spacing: 5px; }

  @media print {
    @page { size: A4; margin: 0 !important; }
    body { background: white !important; }
    .app-header, .form-panel, .preview-toolbar { display: none !important; }
    .container { display: block !important; width: 100% !important; }
    .preview-panel { padding: 0 !important; background: white !important; width: 100% !important; }
    .quotation-page { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
  }
</style>
</head>
<body>

<datalist id="itemNamesDatalist"></datalist>

<div class="app-header">
  <div>
    <h1>🏢 Ahmad Aluminium & Glass Cont</h1>
    <span>Professional Quotation Generator</span>
  </div>
</div>

<div class="container">
  <div class="form-panel" id="formPanel">
    
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80;">
      <label style="color: #4ecca3; font-weight: bold; font-size: 11px;">☁️ Cloud Status</label>
      <div id="syncStatus" style="font-size: 12px; color: #4ecca3; font-weight: bold;">Connected & Synced</div>
    </div>

    <h2 style="margin-top:15px;">📋 Quotation Details</h2>

    <div class="form-group">
      <label>⚙️ Work Type Category</label>
      <select id="workTypeSelector" onchange="onWorkTypeChange(this.value)">
        <option value="Custom">Custom / Manual Input</option>
      </select>
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label>Ref Number</label>
        <input type="text" id="quotRef" placeholder="AA-2026-201">
      </div>
      <button onclick="clearDraft()" style="background: #e74c3c; color: white; border: none; padding: 9px 12px; border-radius: 4px; font-size: 11px; margin-top: 20px;">🧹 Reset</button>
    </div>
    
    <div class="form-group"><label>Date</label><input type="date" id="quotDate"></div>
    <div class="form-group"><label>Client Name / Address</label><input type="text" id="clientAddr" placeholder="Client Details"></div>
    <div class="form-group"><label>Client Phone</label><input type="text" id="clientPhone" placeholder="+971 58 ..."></div>
    <div class="form-group"><label>Subject</label><input type="text" id="subject" placeholder="Glass Room Work"></div>

    <div class="form-group">
      <label>Tax Settings</label>
      <select id="vatToggle" onchange="generateQuotation();">
        <option value="no">No VAT</option>
        <option value="yes">Add 5% UAE VAT</option>
      </select>
    </div>

    <div class="form-group" style="background: rgba(22, 160, 133, 0.15); padding: 12px; border-radius: 6px; border: 1px solid #1abc9c;">
      <label style="color: #1abc9c; font-weight: bold; font-size: 11px;">📐 Room Dimensions (cm)</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
        <input type="number" id="globalWidth" value="400">
        <input type="number" id="globalLength" value="500">
        <input type="number" id="globalHeight" value="300">
      </div>
      <button class="btn-glass-room" onclick="applySmartEstimator()">⚡ Apply Formulas</button>
    </div>

    <h2 style="margin-top:20px;">🔧 Line Items</h2>
    <div class="items-section" id="itemsContainer"></div>
    <button class="btn-add" onclick="addItem()">+ Add Item</button>

    <button class="btn-generate" onclick="generateQuotation(); triggerSilentCloudSave();">⚡ Generate Quotation</button>
  </div>

  <div class="preview-panel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
      <button class="btn-whatsapp" onclick="shareToWhatsApp()">💬 WhatsApp</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc"></div>
  </div>
</div>

<script>
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNizzL9Im6qMmjEcuOhH5404-GMIJDXqSuGw3xrZQARxk1sJhTIkVqT8C2AwvchDHbysmB-oftQ3Sk/pub?output=csv";
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";

let parsedLibrary = {};
let flatItemLibrary = {};
let itemCount = 0;

const DEFAULT_TERMS = `• 60% Advance Payment.
• 30% on all material delivery on site.
• 10% after Completion.
• 5% VAT applied as per UAE law.
• Validity 07 Days.`;

// CSV Parser
function parseCSV(text) {
  let lines = []; let row = [""]; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i]; let next = text[i+1];
    if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) row.push("");
    else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') i++; lines.push(row); row = [""]; }
    else row[row.length - 1] += c;
  }
  lines.push(row); return lines;
}

function processLibraryCSV(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length === 0) return {};
  const tempLib = {};
  const headers = rows[0].map(h => h.toLowerCase().trim());
  
  const idxCat = headers.findIndex(h => h.includes('category'));
  const idxItem = headers.findIndex(h => h.includes('item name') || h === 'item');
  const idxDesc = headers.findIndex(h => h.includes('description') || h.includes('details'));
  const idxPrice = headers.findIndex(h => h.includes('price') || h.includes('rate'));

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[idxItem]) continue;
    let category = row[idxCat] || "Glass Room";
    if (!tempLib[category]) tempLib[category] = [];
    tempLib[category].push({
      name: row[idxItem].trim(),
      desc: row[idxDesc] ? row[idxDesc].trim() : "",
      rate: parseFloat(row[idxPrice].replace(/[^0-9.]/g, '')) || 0
    });
  }
  return tempLib;
}

function loadLibrary() {
  fetch(SPREADSHEET_CSV_URL).then(res => res.text()).then(csv => {
    parsedLibrary = processLibraryCSV(csv);
    const datalist = document.getElementById('itemNamesDatalist');
    const sel = document.getElementById('workTypeSelector');
    Object.keys(parsedLibrary).forEach(cat => {
      let opt = document.createElement('option'); opt.value = cat; opt.textContent = cat;
      sel.appendChild(opt);
      parsedLibrary[cat].forEach(item => {
        flatItemLibrary[item.name] = item;
        let dOpt = document.createElement('option'); dOpt.value = item.name;
        datalist.appendChild(dOpt);
      });
    });
  });
}

function addItem(pName = '', pDesc = '') {
  itemCount++; const id = itemCount;
  const div = document.createElement('div'); div.className = 'item-row'; div.id = 'item_' + id;
  div.innerHTML = `
    <h4>Item #${id}</h4><button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full"><label>Item Name</label><input type="text" id="name_${id}" list="itemNamesDatalist" value="${pName}" oninput="onItemInput(${id}, this.value)"></div>
      <div class="full"><label>Description</label><textarea id="desc_${id}" rows="2">${pDesc}</textarea></div>
      <div class="full"><input type="checkbox" id="toggle_sz_${id}" onchange="toggleSize(${id})"> <label style="display:inline;">Custom Measurements</label></div>
      <div class="full sizes-container" id="sz_cont_${id}">
        <div class="size-row"><span>W</span><input type="number" id="w_${id}" oninput="calc(${id})"><span>×</span><span>H</span><input type="number" id="h_${id}" oninput="calc(${id})"><span>Qty</span><input type="number" id="q_${id}" value="1" oninput="calc(${id})"></div>
      </div>
      <div><label>Price Type</label><select id="type_${id}" onchange="calc(${id})"><option value="Rate">Per m²</option><option value="Fixed">Fixed</option></select></div>
      <div><label>Price (AED)</label><input type="number" id="rate_${id}" oninput="calc(${id})"></div>
    </div>
    <div class="calc-result" id="calc_${id}" data-amount="0">---</div>`;
  document.getElementById('itemsContainer').appendChild(div);
}

function onItemInput(id, val) {
  if (flatItemLibrary[val]) {
    document.getElementById('desc_' + id).value = flatItemLibrary[val].desc;
    document.getElementById('rate_' + id).value = flatItemLibrary[val].rate;
    calc(id);
  }
}

function toggleSize(id) { 
  document.getElementById('sz_cont_'+id).style.display = document.getElementById('toggle_sz_'+id).checked ? 'block' : 'none'; 
  calc(id);
}

function removeItem(id) { document.getElementById('item_'+id).remove(); generateQuotation(); }

function calc(id) {
  const rate = parseFloat(document.getElementById('rate_'+id).value) || 0;
  const type = document.getElementById('type_'+id).value;
  const sizeOn = document.getElementById('toggle_sz_'+id).checked;
  let area = 0; let sizeTxt = '-';
  
  if (sizeOn) {
    const w = parseFloat(document.getElementById('w_'+id).value) || 0;
    const h = parseFloat(document.getElementById('h_'+id).value) || 0;
    const q = parseFloat(document.getElementById('q_'+id).value) || 1;
    if (w && h) { area = (w/100)*(h/100)*q; sizeTxt = `${w}x${h}cm (${q})`; }
  }

  let amount = (type === 'Fixed') ? rate : (area > 0 ? (Math.ceil(area * 2) / 2) * rate : rate);
  const el = document.getElementById('calc_'+id);
  el.dataset.amount = amount;
  el.dataset.size = sizeTxt;
  el.textContent = "AED " + amount.toLocaleString();
}

function generateQuotation() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    items.push({
      name: document.getElementById('name_'+id).value,
      desc: document.getElementById('desc_'+id).value,
      size: document.getElementById('calc_'+id).dataset.size,
      amount: parseFloat(document.getElementById('calc_'+id).dataset.amount) || 0
    });
  });

  const isVat = document.getElementById('vatToggle').value === 'yes';
  let sub = items.reduce((s, i) => s + i.amount, 0);
  let vat = isVat ? sub * 0.05 : 0;
  let grand = sub + vat;

  let rows = '';
  items.forEach((it, idx) => {
    rows += `<tr><td>${idx+1}</td><td><b>${it.name}</b><br><small>${it.desc}</small></td><td align="center">${it.size}</td><td align="right">${it.amount.toLocaleString()}</td></tr>`;
  });

  const html = `
    <div class="quotation-page">
      <div class="watermark-container"><div class="watermark-text">AHMAD ALUMINIUM</div></div>
      <div style="position:relative; z-index:1;">
        <div style="display:flex; justify-content:space-between; border-bottom:3px solid #c0392b; padding-bottom:10px;">
          <div style="font-size:22px; font-weight:bold; color:#c0392b;">AHMAD ALUMINIUM & GLASS</div>
          <div style="font-size:28px; font-weight:bold;">QUOTATION</div>
        </div>
        <div class="client-meta-grid" style="margin-top:20px;">
          <div><b>Client:</b> ${document.getElementById('clientAddr').value}<br><b>Phone:</b> ${document.getElementById('clientPhone').value}</div>
          <div align="right"><b>Ref:</b> ${document.getElementById('quotRef').value}<br><b>Date:</b> ${new Date().toLocaleDateString()}</div>
        </div>
        <div style="background:#c0392b; color:white; padding:6px; text-align:center; font-weight:bold; margin:15px 0;">Subject: ${document.getElementById('subject').value}</div>
        <table border="1">
          <thead><tr><th>#</th><th>Particulars</th><th>Size</th><th>Amount (AED)</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot>
            ${isVat ? `<tr><td colspan="3" align="right"><b>Sub-Total</b></td><td align="right">${sub.toLocaleString()}</td></tr>` : ''}
            ${isVat ? `<tr><td colspan="3" align="right"><b>VAT (5%)</b></td><td align="right">${vat.toLocaleString()}</td></tr>` : ''}
            <tr style="background:#fdf5f5;"><td colspan="3" align="right"><b>Grand Total</b></td><td align="right" style="color:#c0392b; font-weight:bold;">${grand.toLocaleString()}</td></tr>
          </tfoot>
        </table>
        <div class="amount-words">Total: ${grand.toLocaleString()} UAE Dirhams Only</div>
        <div class="doc-section-title">Terms & Conditions</div>
        <ul class="doc-list">${DEFAULT_TERMS.split('\n').map(t => '<li>'+t.replace('• ','')+'</li>').join('')}</ul>
        <div style="margin-top:60px; display:flex; justify-content:space-between;">
          <div style="border-top:1px solid #000; width:150px; text-align:center;">Client Sign</div>
          <div style="border-top:1px solid #000; width:150px; text-align:center;">Project Manager</div>
        </div>
      </div>
    </div>`;
  document.getElementById('quotationDoc').innerHTML = html;
}

function onWorkTypeChange(val) {
  if (val === 'Custom') return;
  document.getElementById('subject').value = "Quotation for " + val;
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  parsedLibrary[val].forEach(item => addItem(item.name, item.desc));
  generateQuotation();
}

function applySmartEstimator() { onWorkTypeChange(document.getElementById('workTypeSelector').value === 'Custom' ? 'Glass Room' : document.getElementById('workTypeSelector').value); }

function triggerSilentCloudSave() {
  const data = { ref: document.getElementById('quotRef').value, client: document.getElementById('clientAddr').value };
  fetch(DB_URL, { method: "POST", body: JSON.stringify(data) });
}

function shareToWhatsApp() {
  const phone = document.getElementById('clientPhone').value.replace(/\D/g,'');
  const msg = encodeURIComponent("Dear Client, Please find the Quotation Ref: " + document.getElementById('quotRef').value);
  window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

function downloadPDF() { window.print(); }

window.onload = () => {
  document.getElementById('quotDate').valueAsDate = new Date();
  loadLibrary();
  addItem();
};
</script>
</body>
</html>
