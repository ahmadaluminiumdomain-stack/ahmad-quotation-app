<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; min-height: 100vh; }

  .app-header { background: #ffffff; padding: 20px 30px; display:flex; align-items:center; gap:15px; border-bottom: 2px solid #cccccc; }
  .app-header h1 { font-size: 22px; color: #666666; }
  .app-header span { color: #999999; font-size: 13px; }

  .container { display: grid; grid-template-columns: 410px 1fr; gap: 0; height: calc(100vh - 70px); }

  .form-panel { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
  .form-panel h2 { color: #e74c3c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f3460; border: 1px solid #1a4a80; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e74c3c; }

  .items-section { margin-top: 10px; }
  .item-row { background: #0a1628; border: 1px solid #1a4a80; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
  .item-row h4 { color: #e74c3c; font-size: 12px; margin-bottom: 8px; }
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-grid .full { grid-column: 1/-1; }
  .item-grid input, .item-grid select { width:100%; background:#16213e; border:1px solid #1a4a80; color:#eee; padding:6px 8px; border-radius:4px; font-size:12px; }
  
  /* Multi-size sub-grid inside the form items (Width, Length, Height, Quantity) */
  .sizes-container { background: #0f3460; padding: 8px; border-radius: 4px; margin-top: 4px; display: none; }
  .sizes-title { font-size: 10px; color: #ffb4a2; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
  .size-row { display: grid; grid-template-columns: 20px 1fr 10px 1fr 10px 1fr 25px 1fr; align-items: center; gap: 4px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
  .size-row input { text-align: center; padding: 4px 2px !important; }

  .calc-result { background: #0f3460; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #4ecca3; margin-top: 6px; line-height: 1.4; }

  .btn-add { width:100%; background: #0f3460; border: 1px dashed #e74c3c; color: #e74c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 5px; }
  .btn-add:hover { background: #e74c3c; color: white; }
  .btn-glass-room { width:100%; background: linear-gradient(135deg, #16a085, #1abc9c); color:white; border:none; padding: 9px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: bold; }
  .btn-glass-room:hover { background: linear-gradient(135deg, #1abc9c, #16a085); }
  .btn-remove { position:absolute; top:8px; right:8px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px; }

  .btn-generate { width:100%; background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; border:none; padding: 12px; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; margin-top:15px; }
  .btn-generate:hover { background: linear-gradient(135deg, #c0392b, #962d22); }

  .preview-panel { background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #ddd; }
  .preview-toolbar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-whatsapp { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .btn-print { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }

  /* QUOTATION DOC PAGES */
  .quotation-page { background: white; width: 820px; min-height: 1080px; height: auto; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: Arial, sans-serif; color: #222; position: relative; margin-bottom: 25px; box-sizing: border-box; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; position: relative; z-index: 1; }
  table th { background: #c0392b; color: white; padding: 10px 8px; text-align: left; }
  table th:last-child { text-align: right; }
  table td { padding: 8px 10px; border: 1px solid #ddd; vertical-align: top; }
  table tr:nth-child(even) td { background: #fdf5f5; }
  .total-row td { font-weight: bold; background: #fdf5f5 !important; border-top: 2px solid #c0392b; }
  .total-row td:last-child { color: #c0392b; font-size: 14px; text-align: right; }

  /* Item name bold, description below */
  .item-name { font-weight: bold; font-size: 12px; color: #111; display: block; margin-bottom: 4px; }
  .item-desc { font-size: 11px; color: #555; line-height: 1.4; display: block; }

  .amount-words { background: #fdf5f5; border: 1px solid #c0392b; padding: 10px 14px; font-size: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; position: relative; z-index: 1; }
  .doc-section-title { color: #c0392b; font-weight: bold; font-size: 13px; margin: 15px 0 8px; position: relative; z-index: 1; }
  .doc-list { list-style: none; font-size: 12px; line-height: 2; position: relative; z-index: 1; }
  .doc-list li::before { content: '✓ '; color: #c0392b; font-weight: bold; }
  .client-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 13px; position: relative; z-index: 1; }
  .section-label { font-size: 11px; text-transform: uppercase; color: #999; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 6px; }
  
  /* Bank cards stacked vertically for high legibility */
  .bank-grid-vertical { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; margin-top: 10px; }
  .bank-card { background: #fdf5f5; border: 1px solid #e0c0c0; padding: 12px 16px; font-size: 12px; line-height: 1.8; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  .bank-card strong { color: #c0392b; font-size: 13px; display: block; margin-bottom: 2px; }
  .bank-iban { font-size: 12px; font-weight: bold; color: #111; letter-spacing: 0.5px; }

  /* CSS Watermark Overlay */
  .watermark-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 0; overflow: hidden; }
  .watermark-text { font-family: Arial, sans-serif; font-size: 55px; font-weight: 900; color: rgba(192, 57, 43, 0.035); text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; letter-spacing: 5px; }

  @media print {
    @page {
      size: A4;
      margin: 0 !important; /* Strip default URL titles & footers from PDF outputs */
    }
    body { background: white !important; margin: 0 !important; padding: 0 !important; }
    .app-header, .form-panel, .preview-toolbar, .page-break-divider { display: none !important; }
    .container { display: block !important; width: 100% !important; }
    .preview-panel { padding: 0 !important; margin: 0 !important; background: white !important; width: 100% !important; }
    .quotation-page {
      box-shadow: none !important;
      border: none !important;
      width: 100% !important;
      height: auto !important;
      min-height: 297mm !important;
      padding: 20mm 15mm 15mm 15mm !important; /* Boundary margin to protect alignment on print margins */
      margin: 0 !important;
      page-break-after: always !important;
    }
    .quotation-page:last-of-type { page-break-after: avoid !important; }
  }
  .page-break-divider { text-align:center; color:#888; font-size:11px; font-weight: bold; padding: 10px 0; letter-spacing:2px; text-transform: uppercase; }
</style>
</head>
<body>

<datalist id="itemNamesDatalist"></datalist>

<div class="app-header">
  <div>
    <h1>🏢 Ahmad Aluminium & Glass Cont</h1>
    <span>#1 Aluminium & Glass Cont UAE — Quotation System</span>
  </div>
</div>

<div class="container">
  <!-- FORM PANEL -->
  <div class="form-panel" id="formPanel">
    
    <!-- CLOUD STATUS SECTION -->
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 15px;">
      <label style="color: #4ecca3; font-weight: bold; font-size: 11px; margin-bottom: 4px; display: block; letter-spacing: 1px;">☁️ Cloud Database Status</label>
      <div id="syncStatus" style="font-size: 12px; color: #4ecca3; font-weight: bold;">☁️ Connected & Synced</div>
    </div>

    <!-- RECENT QUOTATIONS DIRECTORY -->
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 20px;">
      <label style="color: #3498db; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">🔍 Recent Documents Directory</label>
      <input type="text" id="searchQuotes" placeholder="Type to search client, reference, or subject..." oninput="filterRecentQuotes()" style="margin-bottom: 8px; font-size: 11px;">
      <div id="recentQuotesList" style="max-height: 120px; overflow-y: auto; background: #0f3460; border-radius: 4px; padding: 5px; font-size: 11px; color: #eee; border: 1px solid #1a4a80; line-height: 1.4;">
        <div style="text-align: center; color: #888; padding: 10px;">Connect Web App to view history</div>
      </div>
      <button onclick="fetchRecentQuotes()" style="width: 100%; margin-top: 8px; background: #3498db; color: white; border: none; padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;">🔄 Refresh Directory</button>

    <div class="form-group" style="display: flex; gap: 10px; justify-content: space-between; align-items: flex-end;">
      <div style="flex: 1;">

    <div id="smartEstimatorPanel" class="form-group" style="background: rgba(22, 160, 133, 0.15); padding: 12px; border-radius: 6px; border: 1px solid #1abc9c; margin-top: 15px; margin-bottom: 15px;">
      <label style="color: #1abc9c; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">📐 Smart Room Estimator (In Centimeters)</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;">
        <div>
          <label style="font-size: 9px;">Width (cm)</label>
          <input type="number" id="globalWidth" value="400" placeholder="e.g. 400" style="background: #16213e; text-align: center;">
        </div>
        <div>
          <label style="font-size: 9px;">Length (cm)</label>
          <input type="number" id="globalLength" value="500" placeholder="e.g. 500" style="background: #16213e; text-align: center;">
        </div>
        <div>
          <label style="font-size: 9px;">Height (cm)</label>
          <input type="number" id="globalHeight" value="300" placeholder="e.g. 300" style="background: #16213e; text-align: center;">
        </div>
      </div>
      <button class="btn-glass-room" style="margin-top: 0;" onclick="applySmartEstimator()">⚡ Apply Estimator Formulas</button>
    </div>

    <h2 id="itemsHeading" style="margin-top:20px;">🔧 Line Items</h2>
    <div class="items-section" id="itemsContainer"></div>
    <button class="btn-add" onclick="addItem()">+ Add Custom Item</button>

    <button class="btn-generate" onclick="generateQuotation(); triggerSilentCloudSave();">⚡ Generate Quotation & Sketch</button>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download / Print PDF</button>
      <button class="btn-whatsapp" onclick="shareToWhatsApp()">💬 Share to WhatsApp</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc">
      <div style="text-align:center; color:#999; padding:80px 0; font-size:16px;">
        Fill the form and click <strong style="color:#e74c3c">Generate Quotation</strong>
      </div>

<script>

// Core Spreadsheet & Apps Script Targets
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNizzL9Im6qMmjEcuOhH5404-GMIJDXqSuGw3xrZQARxk1sJhTIkVqT8C2AwvchDHbysmB-oftQ3Sk/pub?output=csv";

let parsedLibrary = {};
let hasEstimatorBeenRun = false;
let flatItemLibrary = {};

// ─── OFFLINE BACKUP LIBRARY ────────────────────────────────────────────────
const ITEM_LIBRARY = {
  'Structure': { desc: 'Supply & installation of Juton powder coated 100mm × 100mm, 2mm thick aluminium tube frame for roof and pillars.', rate: 1200, formula: 'W*L' },
  'Swing Door': { desc: 'Supply & installation of Juton powder coated 4.5cm aluminium frame swing door with double glass (6mm tempered clear + 12mm air spacer + 6mm tempered clear glass).', rate: 2500, formula: 'fixed' },
  '3 Side Closing with Cement Board & Gypsum': { desc: 'Supply & installation of outside cement board, inside gypsum board with GI channel, wall construction and white paint finishing.', rate: 400, formula: '((2*L)+W)*H - 2' },
  'Sandwich Panel Roof': { desc: 'Supply & installation of 9cm thick sandwich panel roof with sheets on both sides and insulation foam inside, 10cm slope for drainage, 100% waterproofing.', rate: 450, formula: 'W*L' },
  'Gypsum Ceiling': { desc: 'Supply & installation of GI channel frame for gypsum board ceiling with white paint finishing.', rate: 120, formula: 'W*L' },
  'Electric': { desc: 'Supply & installation of spot lights in gypsum board ceiling and power sockets as required.', rate: 1500, formula: 'fixed' },
  'AC': { desc: 'Supply & installation of 1.5 Ton Samsung or Super General AC with up to 3m copper pipe connection and power supply installation.', rate: 3500, formula: 'fixed' }
};

const DEFAULT_TERMS = `• 60% Advance Payment.
• 30% on all material delivery on site before installation.
• 10% after Completion.
• 5% VAT is calculated on final invoices according to official tax policy.
• Validity of This Offer for 07 Days Only.`;

// ─── DATE AUTOFILL ENGINE ──────────────────────────────────────────────────
function setTodayDate() {
  const dateInput = document.getElementById('quotDate');
  if (dateInput && !dateInput.value) {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateInput.value = `${yyyy}-${mm}-${dd}`;
  }
}

// ─── FETCH & PARSE SPREADSHEET DATA (DYNAMIC COLUMN MATCHING) ───────────────
function loadSpreadsheetLibrary() {
  fetch(SPREADSHEET_CSV_URL)
    .then(res => {
      if (!res.ok) throw new Error("Connection Blocked");
      return res.text();
    })
    .then(csvText => {
      parsedLibrary = processLibraryCSV(csvText);
      populateCategorySelector(parsedLibrary);
      rebuildFlatItemLibrary();
      generateQuotation();
    })
    .catch(err => {
      console.warn("Spreadsheet restricted (Local file/CORS protection active). Loading local database fallback.", err);
      parsedLibrary = {
        "Glass Room": [
          { name: "Structure", desc: ITEM_LIBRARY["Structure"].desc, rate: 1200, formula: "W*L" },
          { name: "Swing Door", desc: ITEM_LIBRARY["Swing Door"].desc, rate: 2500, formula: "fixed" },
          { name: "3 Side Closing with Cement Board & Gypsum", desc: ITEM_LIBRARY["3 Side Closing with Cement Board & Gypsum"].desc, rate: 400, formula: "((2*L)+W)*H - 2" },
          { name: "Sandwich Panel Roof", desc: ITEM_LIBRARY["Sandwich Panel Roof"].desc, rate: 450, formula: "W*L" },
          { name: "Gypsum Ceiling", desc: ITEM_LIBRARY["Gypsum Ceiling"].desc, rate: 120, formula: "W*L" },
          { name: "Electric", desc: ITEM_LIBRARY["Electric"].desc, rate: 1500, formula: "fixed" },
          { name: "AC", desc: ITEM_LIBRARY["AC"].desc, rate: 3500, formula: "fixed" }
        ]
      };
      populateCategorySelector(parsedLibrary);
      rebuildFlatItemLibrary();
      generateQuotation();
    });
}

function parseCSV(text) {
  let lines = [];
  let row = [""];
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i];
    let next = text[i+1];
    if (c === '"') {
      if (inQuotes && next === '"') {
        row[row.length - 1] += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (c === ',' && !inQuotes) {
      row.push("");
    } else if ((c === '\r' || c === '\n') && !inQuotes) {
      if (c === '\r' && next === '\n') i++;
      lines.push(row);
      row = [""];
    } else {
      row[row.length - 1] += c;
    }
  }
  if (row.length > 1 || row[0] !== "") lines.push(row);
  return lines;
}

function processLibraryCSV(csvText) {
  try {
    const rows = parseCSV(csvText);
    if (!rows || rows.length === 0) return {};

    const tempLib = {};
    const firstRow = rows[0].map(h => (h || '').toLowerCase().trim().replace(/[^a-z0-9]/g, ''));
    
    const colIndex = {
      category: firstRow.indexOf('category'),
      itemName: firstRow.findIndex(h => h.includes('itemname') || h.includes('item') || h.includes('name') || h.includes('particular')),
      description: firstRow.findIndex(h => h.includes('description') || h.includes('desc') || h.includes('particulars')),
      price: firstRow.findIndex(h => h.includes('price') || h.includes('rate') || h.includes('cost')),
      formula: firstRow.findIndex(h => h.includes('formula') || h.includes('calc'))
    };

    const idxCat = colIndex.category;
    const idxItem = colIndex.itemName !== -1 ? colIndex.itemName : 0;
    
    // Explicit column tracking overrides to prevent Name/Description from merging
    const idxDesc = colIndex.description !== -1 ? colIndex.description : (idxItem === 0 ? 1 : 2);
    const idxPrice = colIndex.price !== -1 ? colIndex.price : (idxDesc === 1 ? 2 : 3);
    const idxForm = colIndex.formula !== -1 ? colIndex.formula : (idxPrice === 2 ? 3 : 4);

    let activeCategory = "Glass Room";

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length === 0) continue;

      const colA = row[0] ? row[0].trim() : "";
      const colB = row[1] ? row[1].trim() : "";
      const colC = row[2] ? row[2].trim() : "";
      const colD = row[3] ? row[3].trim() : "";

      // Scrape category partitions
      if (colA && !colB && !colC && !colD) {
        activeCategory = colA;
        if (!tempLib[activeCategory]) {
          tempLib[activeCategory] = [];
        }
        continue;
      }

      let category = activeCategory;
      if (idxCat !== -1 && row[idxCat]) {
        const rowCatVal = row[idxCat].trim();
        if (rowCatVal) category = rowCatVal;
      }

      const name = row[idxItem] ? row[idxItem].trim() : "";
      const desc = row[idxDesc] ? row[idxDesc].trim() : "";
      
      let price = 0;
      if (row[idxPrice]) {
        price = parseFloat(row[idxPrice].replace(/[^0-9.]/g, '')) || 0;
      }
      const formula = row[idxForm] ? row[idxForm].trim().toLowerCase() : "";

      if (!name) continue;

      if (!tempLib[category]) {
        tempLib[category] = [];
      }
      tempLib[category].push({
        name: name,
        desc: desc,
        rate: price,
        formula: formula
      });
    }
    return tempLib;
  } catch (e) {
    console.error("CSV Processing breakdown. Bypassing safely.", e);
    return {};
  }
}

function rebuildFlatItemLibrary() {
  flatItemLibrary = {};
  
  Object.keys(ITEM_LIBRARY).forEach(key => {
    flatItemLibrary[key] = {
      desc: ITEM_LIBRARY[key].desc,
      rate: ITEM_LIBRARY[key].rate,
      formula: ITEM_LIBRARY[key].formula
    };
  });

  Object.keys(parsedLibrary).forEach(cat => {
    parsedLibrary[cat].forEach(item => {
      flatItemLibrary[item.name] = {
        desc: item.desc,
        rate: item.rate,
        formula: item.formula
      };
    });
  });

  const datalist = document.getElementById('itemNamesDatalist');
  if (datalist) {
    datalist.innerHTML = '';
    Object.keys(flatItemLibrary).forEach(name => {
      const option = document.createElement('option');
      option.value = name;
      datalist.appendChild(option);
    });
  }
}

function populateCategorySelector(library) {
  const selector = document.getElementById('workTypeSelector');
  selector.innerHTML = '<option value="Custom">Custom / Manual Input</option>';
  Object.keys(library).forEach(cat => {
    selector.innerHTML += `<option value="${cat}">${cat}</option>`;

function loadCategoryItems(catName) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;

  const w = parseFloat(document.getElementById('globalWidth').value) || 0;
  const l = parseFloat(document.getElementById('globalLength').value) || 0;
  const h = parseFloat(document.getElementById('globalHeight').value) || 0;

  const wm = w / 100;
  const lm = l / 100;
  const hm = h / 100;

  if (!parsedLibrary[catName]) return;

  parsedLibrary[catName].forEach(item => {
    let forceCustomSizes = false;
    let sizeW = 0, sizeL = 0, sizeH = 0;
    let formula = item.formula ? item.formula.toLowerCase().trim() : "";
    let rate = item.rate;
    let priceType = "Standard";

    if (formula === "fixed" || !formula) {
      priceType = "Fixed";
    } else {
      if (formula.includes("w") || formula.includes("l") || formula.includes("h")) {
        forceCustomSizes = true;
        if (formula === "w*l" || formula === "l*w") {
          sizeW = w; sizeL = l;
        } else if (formula === "w*h" || formula === "h*w") {
          sizeW = w; sizeH = h;
        } else if (formula === "l*h" || formula === "h*l") {
          sizeL = l; sizeH = h;
        } else {
          const computedArea = evaluateFormula(formula, wm, lm, hm);
          sizeW = 100;
          sizeL = Math.round(computedArea * 100);
        }
      } else {
        priceType = "Fixed";
      }
    }

    addItem(item.name, item.desc, forceCustomSizes);
    const id = itemCount;
    document.getElementById('priceType_' + id).value = priceType;
    onPriceTypeChange(id, priceType);
    document.getElementById('rateInput_' + id).value = rate;

    if (forceCustomSizes && (sizeW > 0 || sizeL > 0 || sizeH > 0)) {
      setDimensionRow(id, 1, sizeW, sizeL, sizeH, 1);
    }
    calcArea(id);
  });
}

// ─── MATHEMATICAL EVALUATION AND CALCULATION MODULE ─────────────────────────
function calcCustomSizeArea(w, l, h, formula) {
  let f = formula.toLowerCase().replace(/\s+/g, '');
  if (f === 'fixed' || !f) return 1;
  let wm = w / 100;
  let lm = l / 100;
  let hm = h / 100;
  let clean = f.replace(/w/g, wm).replace(/l/g, lm).replace(/h/g, hm);
  try {
    if (/^[0-9.+\-*/()]+$/.test(clean)) {
      return Function(`"use strict"; return (${clean})`)();
    }
  } catch(e) {
    console.error(e);
  }
  return wm * lm; 
}

function evaluateFormula(formulaStr, w, l, h) {
  let clean = formulaStr.toLowerCase()
    .replace(/\s+/g, '')
    .replace(/w/g, w)
    .replace(/l/g, l)
    .replace(/h/g, h);
  try {
    if (/^[0-9.+\-*/()]+$/.test(clean)) {
      return Function(`"use strict"; return (${clean})`)();
    }
  } catch(e) {
    console.error("Evaluation error", e);
  }
  return 0;
}

function calcArea(id) {
  let totalRawArea = 0;
  let totalQty = 0;
  let sizeStrings = [];
  const sizeEnabled = document.getElementById('toggle_size_' + id).checked;

  if (sizeEnabled) {
    const name = document.getElementById('name_' + id).value;
    const itemData = flatItemLibrary[name] || {};
    const formula = itemData.formula || "w*h";

    for (let s = 1; s <= 5; s++) {
      const w = parseFloat(document.getElementById(`w${s}_${id}`).value) || 0;
      const l = parseFloat(document.getElementById(`l${s}_${id}`).value) || 0;
      const h = parseFloat(document.getElementById(`h${s}_${id}`).value) || 0;
      const qty = parseFloat(document.getElementById(`qty${s}_${id}`).value) || (s === 1 ? 1 : 0);
      
      if ((w > 0 || l > 0 || h > 0) && qty > 0) {
        const subArea = calcCustomSizeArea(w, l, h, formula);
        totalRawArea += subArea * qty;
        totalQty += qty;
        
        let dims = [];
        if (w > 0) dims.push(`W:${w}`);
        if (l > 0) dims.push(`L:${l}`);
        if (h > 0) dims.push(`H:${h}`);
        sizeStrings.push(`${dims.join('×')}cm (${qty})`);
      }
    }
  } else {
    const name = document.getElementById('name_' + id).value;
    const itemData = flatItemLibrary[name] || {};
    const formula = itemData.formula || "";
    
    const w = parseFloat(document.getElementById('globalWidth').value) || 0;
    const l = parseFloat(document.getElementById('globalLength').value) || 0;
    const h = parseFloat(document.getElementById('globalHeight').value) || 0;
    
    const wm = w / 100;
    const lm = l / 100;
    const hm = h / 100;
    
    if (formula && formula !== 'fixed') {
      totalRawArea = evaluateFormula(formula, wm, lm, hm);
      totalQty = 1;
      sizeStrings.push(`Smart Estimator (${w}×${l}×${h}cm)`);
    } else if (formula === 'fixed') {
      totalRawArea = 0;
      totalQty = 1;
    } else {
      totalRawArea = wm * lm;
      totalQty = 1;
    }
  }

  const rateVal = parseFloat(document.getElementById('rateInput_' + id).value) || 0;
  const pricingOption = document.getElementById('priceType_' + id).value;

  let amount = 0;
  let calcText = '';

  if (pricingOption === 'Fixed') {
    const activeQty = totalQty > 0 ? totalQty : 1;
    amount = rateVal * activeQty;
    calcText = `Fixed Price Total: AED ${amount.toLocaleString('en', {minimumFractionDigits:2})}`;
  } else if (totalRawArea > 0 && rateVal > 0) {
    const roundedArea = Math.ceil(totalRawArea * 2) / 2;
    amount = roundedArea * rateVal;
    calcText = `Area: ${totalRawArea.toFixed(4)}m² → Rounded: ${roundedArea.toFixed(1)}m² × AED ${rateVal.toFixed(2)}/m² = AED ${amount.toFixed(2)}`;
  } else if (totalRawArea > 0) {
    calcText = `Area: ${totalRawArea.toFixed(4)}m² | Enter base rate`;
  } else if (rateVal > 0) {
    amount = rateVal;
    calcText = `Flat Rate Cost: AED ${amount.toFixed(2)}`;
  } else {
    calcText = 'No calculation data';
  }

  const el = document.getElementById('calc_' + id);
  el.textContent = calcText;
  el.dataset.amount = amount;
  el.dataset.sizeText = sizeStrings.length > 0 ? sizeStrings.join(' | ') : '-';
  el.dataset.roundedArea = totalRawArea > 0 ? (Math.ceil(totalRawArea * 2) / 2).toFixed(1) : '';
}

function duplicateItemRow(id) {
  const name = document.getElementById('name_' + id).value;
  const desc = document.getElementById('desc_' + id).value;
  const isSizesChecked = document.getElementById('toggle_size_' + id).checked;
  addItem(name, desc, isSizesChecked);
  const targetId = itemCount;
  if (isSizesChecked) {
    for (let s = 1; s <= 5; s++) {
      document.getElementById(`w${s}_${targetId}`).value = document.getElementById(`w${s}_${id}`).value;
      document.getElementById(`l${s}_${targetId}`).value = document.getElementById(`l${s}_${id}`).value;
      document.getElementById(`h${s}_${targetId}`).value = document.getElementById(`h${s}_${id}`).value;
      document.getElementById(`qty${s}_${targetId}`).value = document.getElementById(`qty${s}_${id}`).value;
    }
  }
  const priceType = document.getElementById('priceType_' + id).value;
  document.getElementById('priceType_' + targetId).value = priceType;
  onPriceTypeChange(targetId, priceType);
  document.getElementById('rateInput_' + targetId).value = document.getElementById('rateInput_' + id).value;
  calcArea(targetId);
  generateQuotation();
  triggerSilentCloudSave();
}

function getItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const nameEl = document.getElementById('name_' + id);
    const selectedName = nameEl ? nameEl.value : '';
    let itemName = (selectedName && selectedName !== '-- Select Item --' && selectedName !== 'Custom') ? selectedName : '';
    const calcEl = document.getElementById('calc_' + id);
    const amount = parseFloat(calcEl.dataset.amount) || 0;
    const size = calcEl.dataset.sizeText || '-';
    const roundedArea = calcEl.dataset.roundedArea || '';
    const desc = document.getElementById('desc_' + id).value;
    items.push({ itemName, desc, size, qty: 1, amount, roundedArea });
  });
  return items;
}

// ─── LOCAL STORAGE SERIALIZATION ───────────────────────────────────────────
function serializeItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const name = document.getElementById('name_' + id).value;
    const desc = document.getElementById('desc_' + id).value;
    const priceType = document.getElementById('priceType_' + id).value;
    const rateInput = document.getElementById('rateInput_' + id).value;
    const sizesChecked = document.getElementById('toggle_size_' + id).checked;
    const sizes = [];
    if (sizesChecked) {
      for (let s = 1; s <= 5; s++) {
        sizes.push({
          w: document.getElementById(`w${s}_${id}`).value,
          l: document.getElementById(`l${s}_${id}`).value,
          h: document.getElementById(`h${s}_${id}`).value,
          qty: document.getElementById(`qty${s}_${id}`).value
        });
      }
    }
    items.push({ name, desc, priceType, rateInput, sizesChecked, sizes });
  });
  return items;
}

function deserializeItems(data) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  
  const parsedData = Array.isArray(data) ? data : (data.data || []);
  
  parsedData.forEach(item => {
    addItem(item.name, item.desc, item.sizesChecked);
    const id = itemCount;
    document.getElementById('priceType_' + id).value = item.priceType || 'Standard';
    onPriceTypeChange(id, item.priceType || 'Standard');
    document.getElementById('rateInput_' + id).value = item.rateInput || '';
    if (item.sizes && item.sizesChecked) {
      item.sizes.forEach((sz, idx) => {
        const s = idx + 1;
        document.getElementById(`w${s}_${id}`).value = sz.w || '';
        document.getElementById(`l${s}_${id}`).value = sz.l || '';
        document.getElementById(`h${s}_${id}`).value = sz.h || '';
        document.getElementById(`qty${s}_${id}`).value = sz.qty || '';
      });
    }
    calcArea(id);
  });
}

function saveDraft() {
  const draft = {
    ref: document.getElementById('quotRef').value,
    date: document.getElementById('quotDate').value,
    clientAddr: document.getElementById('clientAddr').value,
    clientPhone: document.getElementById('clientPhone').value,
    clientEmail: document.getElementById('clientEmail').value,
    subject: document.getElementById('subject').value,
    vatToggle: document.getElementById('vatToggle').value,
    items: serializeItems()
  };
  localStorage.setItem('quotationDraft', JSON.stringify(draft));
}

function loadDraft() {
  const raw = localStorage.getItem('quotationDraft');

  if (raw) {
    try {
      const draft = JSON.parse(raw);
      if (draft.ref) document.getElementById('quotRef').value = draft.ref;
      if (draft.date) document.getElementById('quotDate').value = draft.date;
      document.getElementById('clientAddr').value = draft.clientAddr || '';
      document.getElementById('clientPhone').value = draft.clientPhone || '';
      document.getElementById('clientEmail').value = draft.clientEmail || '';
      document.getElementById('subject').value = draft.subject || '';
      document.getElementById('vatToggle').value = draft.vatToggle || 'no';

      if (draft.items) {
        deserializeItems(draft.items);
      } else {
        addItem();
      }
    } catch (e) {
      console.error(e);
      addItem();
    }
  } else {
    addItem();
  }
}

function clearDraft() {
  if (confirm('Clear entire form inputs and reset?')) {
    localStorage.removeItem('quotationDraft');
    document.getElementById('clientAddr').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientEmail').value = '';
    document.getElementById('subject').value = '';
    document.getElementById('vatToggle').value = 'no';
    document.getElementById('itemsContainer').innerHTML = '';
    hasEstimatorBeenRun = false;
    
    setTodayDate();
    
    if (allFetchedQuotes.length > 0) {
      determineNextRefAndAssign(allFetchedQuotes);
    } else {
      document.getElementById('quotRef').value = "AA-2026-201";
    }
    
    addItem();
    saveDraft();
  }
}

let allFetchedQuotes = [];
function fetchRecentQuotes() {
  const listEl = document.getElementById('recentQuotesList');
  listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">Connecting...</div>';
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    allFetchedQuotes = quotes;
    renderQuotesList(quotes);
    determineNextRefAndAssign(quotes);
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = '<div style="text-align: center; color: #ffb4a2; padding: 10px;">Connection issue</div>';
  });
}

function fetchRecentQuotesSilently() {
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    allFetchedQuotes = quotes;
    renderQuotesList(quotes);
  })
  .catch(err => console.error(err));
}

function renderQuotesList(quotes) {
  const listEl = document.getElementById('recentQuotesList');
  if (!quotes || quotes.length === 0) {
    listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No entries</div>';
    return;
  }
  listEl.innerHTML = '';
  quotes.forEach(q => {
    const item = document.createElement('div');
    item.style.padding = '6px';
    item.style.borderBottom = '1px solid #1a4a80';
    item.style.cursor = 'pointer';
    item.onmouseover = () => item.style.background = '#16213e';
    item.onmouseout = () => item.style.background = 'none';
    item.onclick = () => loadSelectedQuote(q.ref);
    item.innerHTML = `
      <div style="display:flex; justify-content:space-between; font-weight:bold;">
        <span style="color:#e74c3c;">${q.ref}</span>
        <span style="font-size:10px; color:#4ecca3;">${q.date || ''}</span>
      </div>
      <div style="font-size:10px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
        ${q.clientAddr || ''} - ${q.subject || ''}
      </div>
    `;
    listEl.appendChild(item);
  });
}

function filterRecentQuotes() {
  const query = document.getElementById('searchQuotes').value.toLowerCase();
  const filtered = allFetchedQuotes.filter(q => {
    return (q.ref && q.ref.toLowerCase().includes(query)) ||
           (q.clientAddr && q.clientAddr.toLowerCase().includes(query)) ||
           (q.subject && q.subject.toLowerCase().includes(query));
  });
  renderQuotesList(filtered);
}

function loadSelectedQuote(ref) {
  const found = allFetchedQuotes.find(q => q.ref === ref);
  if (found) {
    document.getElementById('quotRef').value = found.ref;
    document.getElementById('quotDate').value = found.date;
    document.getElementById('clientAddr').value = found.clientAddr;
    document.getElementById('clientPhone').value = found.clientPhone;
    document.getElementById('clientEmail').value = found.clientEmail;
    document.getElementById('subject').value = found.subject;
    if (found.itemsJson) {
      const itemsData = JSON.parse(found.itemsJson);
      deserializeItems(itemsData);
    }
    generateQuotation();
  }
}

// ─── LIVE AUTO SEQUENCE REFERENCE GENERATOR ──────────────────────────────
function determineNextRefAndAssign(quotes) {
  let highestNum = 200; // Baseline floor start at AA-2026-201
  quotes.forEach(q => {
    const match = q.ref.match(/AA-\d+-(\d+)/i);
    if (match) {
      const num = parseInt(match[1]);
      if (num > highestNum) highestNum = num;
    }
  });
  const computedNext = highestNum + 1;
  document.getElementById('quotRef').value = "AA-2026-" + computedNext;
}
