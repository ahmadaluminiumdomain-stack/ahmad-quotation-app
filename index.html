<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; min-height: 100vh; }

  .app-header { background: #ffffff; padding: 20px 30px; display:flex; align-items:center; gap:15px; border-bottom: 2px solid #cccccc; }
  .app-header h1 { font-size: 22px; color: #666666; }
  .app-header span { color: #999999; font-size: 13px; }

  .container { display: grid; grid-template-columns: 410px 1fr; gap: 0; height: calc(100vh - 70px); }

  .form-panel { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
  .form-panel h2 { color: #e74c3c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f3460; border: 1px solid #1a4a80; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e74c3c; }

  .items-section { margin-top: 10px; }
  .item-row { background: #0a1628; border: 1px solid #1a4a80; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
  .item-row h4 { color: #e74c3c; font-size: 12px; margin-bottom: 8px; }
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-grid .full { grid-column: 1/-1; }
  .item-grid input, .item-grid select { width:100%; background:#16213e; border:1px solid #1a4a80; color:#eee; padding:6px 8px; border-radius:4px; font-size:12px; }
  
  .sizes-container { background: #0f3460; padding: 8px; border-radius: 4px; margin-top: 4px; display: none; }
  .sizes-title { font-size: 10px; color: #ffb4a2; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
  .size-row { display: grid; grid-template-columns: 20px 1fr 15px 1fr 25px 1fr; align-items: center; gap: 4px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
  .size-row input { text-align: center; padding: 4px 2px !important; }

  .calc-result { background: #0f3460; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #4ecca3; margin-top: 6px; line-height: 1.4; }

  .btn-add { width:100%; background: #0f3460; border: 1px dashed #e74c3c; color: #e74c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 5px; }
  .btn-add:hover { background: #e74c3c; color: white; }
  .btn-glass-room { width:100%; background: linear-gradient(135deg, #16a085, #1abc9c); color:white; border:none; padding: 9px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: bold; }
  .btn-glass-room:hover { background: linear-gradient(135deg, #1abc9c, #16a085); }
  .btn-remove { position:absolute; top:8px; right:8px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px; }

  .btn-generate { width:100%; background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; border:none; padding: 12px; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; margin-top:15px; }
  .btn-generate:hover { background: linear-gradient(135deg, #c0392b, #962d22); }

  .preview-panel { background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #ddd; }
  .preview-toolbar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-whatsapp { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  .btn-print { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }

  .quotation-page { background: white; width: 820px; min-height: 1080px; height: auto; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: Arial, sans-serif; color: #222; position: relative; margin-bottom: 25px; box-sizing: border-box; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; position: relative; z-index: 1; }
  table th { background: #c0392b; color: white; padding: 10px 8px; text-align: left; }
  table td { padding: 8px 10px; border: 1px solid #ddd; vertical-align: top; }
  table tr:nth-child(even) td { background: #fdf5f5; }
  .total-row td { font-weight: bold; background: #fdf5f5 !important; border-top: 2px solid #c0392b; }

  .item-name { font-weight: bold; font-size: 12px; color: #111; display: block; margin-bottom: 4px; }
  .item-desc { font-size: 11.5px; color: #444; line-height: 1.5; display: block; }

  .amount-words { background: #fdf5f5; border: 1px solid #c0392b; padding: 10px 14px; font-size: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; position: relative; z-index: 1; }
  .doc-section-title { color: #c0392b; font-weight: bold; font-size: 13px; margin: 15px 0 8px; position: relative; z-index: 1; }
  .doc-list { list-style: none; font-size: 12px; line-height: 2; position: relative; z-index: 1; }
  .doc-list li::before { content: '✓ '; color: #c0392b; font-weight: bold; }
  .client-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 13px; position: relative; z-index: 1; }
  .section-label { font-size: 11px; text-transform: uppercase; color: #999; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 6px; }
  
  .bank-grid-vertical { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; margin-top: 10px; }
  .bank-card { background: #fdf5f5; border: 1px solid #e0c0c0; padding: 12px 16px; font-size: 12px; line-height: 1.8; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  .bank-card strong { color: #c0392b; font-size: 13px; display: block; margin-bottom: 2px; }
  .bank-iban { font-size: 12px; font-weight: bold; color: #111; letter-spacing: 0.5px; }

  .watermark-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 0; overflow: hidden; }
  .watermark-text { font-family: Arial, sans-serif; font-size: 55px; font-weight: 900; color: rgba(192, 57, 43, 0.035); text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; letter-spacing: 5px; }

  @media print {
    @page { size: A4; margin: 0 !important; }
    body { background: white !important; margin: 0 !important; padding: 0 !important; }
    .app-header, .form-panel, .preview-toolbar, .page-break-divider { display: none !important; }
    .container { display: block !important; width: 100% !important; }
    .preview-panel { padding: 0 !important; margin: 0 !important; background: white !important; width: 100% !important; }
    .quotation-page { box-shadow: none !important; border: none !important; width: 100% !important; height: auto !important; min-height: 297mm !important; padding: 20mm 15mm 15mm 15mm !important; margin: 0 !important; page-break-after: always !important; }
    .quotation-page:last-of-type { page-break-after: avoid !important; }
  }
  .page-break-divider { text-align:center; color:#888; font-size:11px; font-weight: bold; padding: 10px 0; letter-spacing:2px; text-transform: uppercase; }
</style>
</head>
<body>

<datalist id="itemNamesDatalist"></datalist>

<div class="app-header">
  <div>
    <h1>🏢 Ahmad Aluminium & Glass Cont</h1>
    <span>#1 Aluminium & Glass Cont UAE — Quotation Generator</span>
  </div>
</div>

<div class="container">
  <div class="form-panel" id="formPanel">
    
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 15px;">
      <label style="color: #4ecca3; font-weight: bold; font-size: 11px; margin-bottom: 4px; display: block; letter-spacing: 1px;">☁️ Cloud Database Status</label>
      <div id="syncStatus" style="font-size: 12px; color: #4ecca3; font-weight: bold;">☁️ Connected & Synced</div>
    </div>

    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 20px;">
      <label style="color: #3498db; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">🔍 Recent Quotations Directory</label>
      <input type="text" id="searchQuotes" placeholder="Type to search..." oninput="filterRecentQuotes()" style="margin-bottom: 8px; font-size: 11px;">
      <div id="recentQuotesList" style="max-height: 120px; overflow-y: auto; background: #0f3460; border-radius: 4px; padding: 5px; font-size: 11px; color: #eee; border: 1px solid #1a4a80;">
        <div style="text-align: center; color: #888; padding: 10px;">Loading History...</div>
      </div>
      <button onclick="fetchRecentQuotes()" style="width: 100%; margin-top: 8px; background: #3498db; color: white; border: none; padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer;">🔄 Refresh Directory</button>
    </div>

    <h2>📋 Quotation Details</h2>

    <div class="form-group">
      <label>⚙️ Work Type Category</label>
      <select id="workTypeSelector" onchange="onWorkTypeChange(this.value)">
        <option value="Custom">Custom / Manual Input</option>
      </select>
    </div>

    <div class="form-group">
      <label>📑 Document Layout</label>
      <select id="documentMode" onchange="generateQuotation();">
        <option value="Quotation">Standard Quotation</option>
        <option value="Invoice">Tax Invoice (Advance 60%)</option>
      </select>
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label>Ref Number</label>
        <input type="text" id="quotRef" placeholder="AA-2026-201">
      </div>
      <button onclick="clearDraft()" style="background: #e74c3c; color: white; border: none; padding: 9px 12px; border-radius: 4px; font-size: 11px; margin-top: 20px;">🧹 Reset</button>
    </div>
    
    <div class="form-group"><label>Date</label><input type="date" id="quotDate"></div>
    <div class="form-group"><label>Client Address</label><input type="text" id="clientAddr" placeholder="Al Sufouh, Dubai"></div>
    <div class="form-group"><label>Client Phone</label><input type="text" id="clientPhone" placeholder="+971 58 849 0784"></div>
    <div class="form-group"><label>Client Email</label><input type="text" id="clientEmail" placeholder="NA"></div>
    <div class="form-group"><label>Subject</label><input type="text" id="subject" placeholder="Glass Room Work"></div>

    <div class="form-group">
      <label>Tax Settings</label>
      <select id="vatToggle" onchange="generateQuotation();">
        <option value="no">No VAT</option>
        <option value="yes">Add 5% UAE VAT</option>
      </select>
    </div>

    <div class="form-group" style="background: rgba(22, 160, 133, 0.15); padding: 12px; border-radius: 6px; border: 1px solid #1abc9c;">
      <label style="color: #1abc9c; font-weight: bold; font-size: 11px;">📐 Room Dimensions (cm)</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
        <input type="number" id="globalWidth" value="400" placeholder="W">
        <input type="number" id="globalLength" value="500" placeholder="L">
        <input type="number" id="globalHeight" value="300" placeholder="H">
      </div>
      <button class="btn-glass-room" onclick="applySmartEstimator()">⚡ Apply Formulas</button>
    </div>

    <h2 style="margin-top:20px;">🔧 Line Items</h2>
    <div class="items-section" id="itemsContainer"></div>
    <button class="btn-add" onclick="addItem()">+ Add Custom Item</button>

    <button class="btn-generate" onclick="generateQuotation(); triggerSilentCloudSave();">⚡ Generate & View Document</button>
  </div>

  <div class="preview-panel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
      <button class="btn-whatsapp" onclick="shareToWhatsApp()">💬 WhatsApp</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc">
      <div style="text-align:center; color:#999; padding:80px 0;">Fill form & Generate</div>
    </div>
  </div>
</div>

<script>
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNizzL9Im6qMmjEcuOhH5404-GMIJDXqSuGw3xrZQARxk1sJhTIkVqT8C2AwvchDHbysmB-oftQ3Sk/pub?output=csv";

let parsedLibrary = {};
let flatItemLibrary = {};
let hasEstimatorBeenRun = false;
let itemCount = 0;

const DEFAULT_TERMS = `• 60% Advance Payment.
• 30% on all material delivery on site.
• 10% after Completion.
• 5% VAT applied as per UAE law.
• Validity 07 Days.`;

// --- CSV PROCESSING (FIXED LOGIC) ---
function processLibraryCSV(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length === 0) return {};

  const tempLib = {};
  const firstRow = rows[0].map(h => h.toLowerCase().trim());
  
  // Find indices based on your new header names
  const idxCat = firstRow.findIndex(h => h.includes('category'));
  const idxItem = firstRow.findIndex(h => h.includes('item name') || h === 'item');
  const idxDesc = firstRow.findIndex(h => h.includes('description') || h.includes('details'));
  const idxPrice = firstRow.findIndex(h => h.includes('price') || h.includes('rate'));
  const idxForm = firstRow.findIndex(h => h.includes('formula'));

  let activeCategory = "Glass Room";

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;

    const name = row[idxItem] ? row[idxItem].trim() : "";
    const desc = row[idxDesc] ? row[idxDesc].trim() : "";
    
    // Safety check: Skip separator rows or rows without names
    if (!name || name.toLowerCase().includes('item name')) continue;

    let category = activeCategory;
    if (idxCat !== -1 && row[idxCat]) category = row[idxCat].trim();

    let price = 0;
    if (idxPrice !== -1 && row[idxPrice]) price = parseFloat(row[idxPrice].replace(/[^0-9.]/g, '')) || 0;
    
    const formula = idxForm !== -1 && row[idxForm] ? row[idxForm].trim().toLowerCase() : "";

    if (!tempLib[category]) tempLib[category] = [];
    tempLib[category].push({ name, desc, rate: price, formula });
  }
  return tempLib;
}

function parseCSV(text) {
  let lines = []; let row = [""]; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i]; let next = text[i+1];
    if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) row.push("");
    else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') i++; lines.push(row); row = [""]; }
    else row[row.length - 1] += c;
  }
  lines.push(row); return lines;
}

function loadSpreadsheetLibrary() {
  fetch(SPREADSHEET_CSV_URL).then(res => res.text()).then(csvText => {
    parsedLibrary = processLibraryCSV(csvText);
    rebuildFlatItemLibrary();
    populateCategorySelector();
  });
}

function rebuildFlatItemLibrary() {
  flatItemLibrary = {};
  const datalist = document.getElementById('itemNamesDatalist');
  datalist.innerHTML = '';
  Object.keys(parsedLibrary).forEach(cat => {
    parsedLibrary[cat].forEach(item => {
      flatItemLibrary[item.name] = item;
      let opt = document.createElement('option'); opt.value = item.name;
      datalist.appendChild(opt);
    });
  });
}

function populateCategorySelector() {
  const sel = document.getElementById('workTypeSelector');
  sel.innerHTML = '<option value="Custom">Custom Input</option>';
  Object.keys(parsedLibrary).forEach(cat => {
    let opt = document.createElement('option'); opt.value = cat; opt.textContent = cat;
    sel.appendChild(opt);
  });
}

function onWorkTypeChange(val) {
  if (val === 'Custom') return;
  document.getElementById('subject').value = "Supply & Installation of " + val;
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  parsedLibrary[val].forEach(item => addItem(item.name, item.desc));
  generateQuotation();
}

function addItem(pName = '', pDesc = '') {
  itemCount++; const id = itemCount;
  const div = document.createElement('div'); div.className = 'item-row'; div.id = 'item_' + id;
  div.innerHTML = `
    <h4>Item #${id}</h4><button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full"><label>Item Name</label><input type="text" id="name_${id}" list="itemNamesDatalist" value="${pName}" oninput="onItemNameInput(${id}, this.value)"></div>
      <div class="full"><label>Description</label><textarea id="desc_${id}" rows="2">${pDesc}</textarea></div>
      <div class="full"><input type="checkbox" id="toggle_size_${id}" onchange="toggleSizeDisplay(${id})"> <label style="display:inline;">Add Custom Sizes</label></div>
      <div class="full sizes-container" id="sizes_container_${id}">
        <div class="size-row"><span>#1</span><input type="number" id="w1_${id}" placeholder="W" oninput="calcArea(${id})"><span>×</span><input type="number" id="h1_${id}" placeholder="H" oninput="calcArea(${id})"><span>Qty</span><input type="number" id="qty1_${id}" value="1" oninput="calcArea(${id})"></div>
      </div>
      <div><label>Price Type</label><select id="pType_${id}" onchange="calcArea(${id})"><option value="Rate">Per m²</option><option value="Fixed">Fixed</option></select></div>
      <div><label>Rate (AED)</label><input type="number" id="rate_${id}" oninput="calcArea(${id})"></div>
    </div>
    <div class="calc-result" id="calc_${id}" data-amount="0">Pending info...</div>`;
  document.getElementById('itemsContainer').appendChild(div);
}

function onItemNameInput(id, val) {
  if (flatItemLibrary[val]) {
    document.getElementById('desc_' + id).value = flatItemLibrary[val].desc;
    document.getElementById('rate_' + id).value = flatItemLibrary[val].rate;
    calcArea(id);
  }
}

function toggleSizeDisplay(id) {
  const cont = document.getElementById('sizes_container_' + id);
  cont.style.display = document.getElementById('toggle_size_' + id).checked ? 'block' : 'none';
  calcArea(id);
}

function removeItem(id) { document.getElementById('item_' + id).remove(); generateQuotation(); }

function calcArea(id) {
  const rate = parseFloat(document.getElementById('rate_' + id).value) || 0;
  const pType = document.getElementById('pType_' + id).value;
  const sizeOn = document.getElementById('toggle_size_' + id).checked;
  let totalArea = 0; let totalQty = 0; let sizeTxt = [];

  if (sizeOn) {
    const w = parseFloat(document.getElementById('w1_' + id).value) || 0;
    const h = parseFloat(document.getElementById('h1_' + id).value) || 0;
    const q = parseFloat(document.getElementById('qty1_' + id).value) || 1;
    if (w && h) { totalArea = (w/100)*(h/100)*q; totalQty = q; sizeTxt.push(`${w}x${h}cm (${q})`); }
  }

  let amount = 0;
  if (pType === 'Fixed') amount = rate;
  else amount = (totalArea > 0) ? (Math.ceil(totalArea * 2) / 2) * rate : rate;

  const el = document.getElementById('calc_' + id);
  el.dataset.amount = amount;
  el.dataset.sizeText = sizeTxt.join(' | ') || '-';
  el.textContent = "Amount: AED " + amount.toFixed(2);
}

function getItems() {
  let arr = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    arr.push({
      itemName: document.getElementById('name_' + id).value,
      desc: document.getElementById('desc_' + id).value,
      size: document.getElementById('calc_' + id).dataset.sizeText,
      amount: parseFloat(document.getElementById('calc_' + id).dataset.amount) || 0
    });
  });
  return arr;
}

function generateQuotation() {
  const items = getItems();
  const mode = document.getElementById('documentMode').value;
  const isInvoice = (mode === 'Invoice');
  const isVat = document.getElementById('vatToggle').value === 'yes';
  
  let total = items.reduce((s, i) => s + i.amount, 0);
  let advance = total * 0.6;
  let activeTotal = isInvoice ? advance : total;
  let vat = isVat ? activeTotal * 0.05 : 0;
  let grand = activeTotal + vat;

  const header = `
    <div style="display:flex; justify-content:space-between; border-bottom:3px solid #c0392b; padding-bottom:10px;">
      <div style="font-size:20px; font-weight:bold; color:#c0392b;">AHMAD ALUMINIUM & GLASS</div>
      <div style="font-size:30px; font-weight:bold;">${mode.toUpperCase()}</div>
    </div>`;

  let rows = '';
  items.forEach((it, idx) => {
    rows += `<tr><td>${idx+1}</td><td><b>${it.itemName}</b><br><small>${it.desc}</small></td><td align="center">${it.size}</td><td align="right">${it.amount.toLocaleString()}</td></tr>`;
  });

  const doc = `
    <div class="quotation-page">
      <div class="watermark-container"><div class="watermark-text">AHMAD ALUMINIUM</div></div>
      <div style="position:relative; z-index:1;">
        ${header}
        <div class="client-meta-grid" style="margin-top:20px;">
          <div><b>To:</b> ${document.getElementById('clientAddr').value}<br><b>Phone:</b> ${document.getElementById('clientPhone').value}</div>
          <div align="right"><b>Ref:</b> ${document.getElementById('quotRef').value}<br><b>Date:</b> ${new Date().toLocaleDateString()}</div>
        </div>
        <div style="background:#c0392b; color:white; padding:5px; text-align:center; font-weight:bold; margin:15px 0;">Subject: ${document.getElementById('subject').value}</div>
        <table border="1">
          <thead><tr><th>#</th><th>Particulars</th><th>Size</th><th>Total (AED)</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div align="right" style="font-size:14px; font-weight:bold;">
          ${isInvoice ? 'Advance (60%): AED '+advance.toLocaleString()+'<br>' : ''}
          ${isVat ? 'VAT (5%): AED '+vat.toLocaleString()+'<br>' : ''}
          Grand Total: AED ${grand.toLocaleString()}
        </div>
        <div class="amount-words" style="margin-top:10px;">Total in Words: ${numberToWords(grand)}</div>
        <div class="doc-section-title">Terms & Conditions</div>
        <ul class="doc-list">${DEFAULT_TERMS.split('\n').map(t => '<li>'+t.replace('• ','')+'</li>').join('')}</ul>
        <div style="margin-top:50px; display:flex; justify-content:space-between;">
          <div style="border-top:1px solid #000; width:150px; text-align:center;">Client Sign</div>
          <div style="border-top:1px solid #000; width:150px; text-align:center;">Ahmad Aluminium</div>
        </div>
      </div>
    </div>`;
  document.getElementById('quotationDoc').innerHTML = doc;
}

function numberToWords(n) { return n.toLocaleString() + " UAE Dirhams Only"; }

function applySmartEstimator() {
  hasEstimatorBeenRun = true;
  const cat = document.getElementById('workTypeSelector').value;
  onWorkTypeChange(cat === 'Custom' ? 'Glass Room' : cat);
}

function triggerSilentCloudSave() {
  document.getElementById('syncStatus').textContent = "☁️ Saving...";
  const data = {
    ref: document.getElementById('quotRef').value,
    client: document.getElementById('clientAddr').value,
    total: getItems().reduce((s, i) => s + i.amount, 0)
  };
  fetch(DB_URL, { method: "POST", body: JSON.stringify(data) }).then(() => {
    document.getElementById('syncStatus').textContent = "☁️ Synced";
  });
}

function shareToWhatsApp() {
  const phone = document.getElementById('clientPhone').value.replace(/\D/g,'');
  const msg = encodeURIComponent("Hello, please find your quotation Ref: " + document.getElementById('quotRef').value);
  window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

function downloadPDF() { window.print(); }

window.onload = () => {
  document.getElementById('quotDate').valueAsDate = new Date();
  loadSpreadsheetLibrary();
  addItem();
};
</script>
</body>
