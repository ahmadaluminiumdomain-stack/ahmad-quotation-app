<script>

// Hardcoded new live Google Apps Script web app URL as default
const DB_URL = "https://script.google.com/macros/s/AKfycbZDZ8PGlml7UWpLfLh3ccbyhzkZ2_GqnxGfCYELkyLmmZItxVY_vpjmkTOSmQHXfDmDA/exec";
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1OympSCR6CIcQ0re9kdGRf3noTUfSw2Tgvm-oPRoHD10/export?format=csv";

let parsedLibrary = {};
let hasEstimatorBeenRun = false;

// ─── OFFLINE BACKUP LIBRARY ────────────────────────────────────────────────
const ITEM_LIBRARY = {
  'Structure': { desc: 'Supply & installation of Juton powder coated 100mm × 100mm, 2mm thick aluminium tube frame for roof and pillars.', rate: 1200, isFixed: false },
  'Swing Door': { desc: 'Supply & installation of Juton powder coated 4.5cm aluminium frame swing door with double glass (6mm tempered clear + 12mm air spacer + 6mm tempered clear glass).', rate: 2500, isFixed: true },
  '3 Side Closing with Cement Board & Gypsum': { desc: 'Supply & installation of outside cement board, inside gypsum board with GI channel, wall construction and white paint finishing.', rate: 400, isFixed: false },
  'Sandwich Panel Roof': { desc: 'Supply & installation of 9cm thick sandwich panel roof with sheets on both sides and insulation foam inside, 10cm slope for drainage, 100% waterproofing.', rate: 450, isFixed: false },
  'Gypsum Ceiling': { desc: 'Supply & installation of GI channel frame for gypsum board ceiling with white paint finishing.', rate: 120, isFixed: false },
  'Electric': { desc: 'Supply & installation of spot lights in gypsum board ceiling and power sockets as required.', rate: 1500, isFixed: true },
  'AC': { desc: 'Supply & installation of 1.5 Ton Samsung or Super General AC with up to 3m copper pipe connection and power supply installation.', rate: 3500, isFixed: true }
};

// ─── FETCH & PARSE SPREADSHEET DATA ─────────────────────────────────────────
function loadSpreadsheetLibrary() {
  fetch(SPREADSHEET_CSV_URL)
    .then(res => res.text())
    .then(csvText => {
      parsedLibrary = processLibraryCSV(csvText);
      populateCategorySelector(parsedLibrary);
    })
    .catch(err => {
      console.warn("Spreadsheet connection offline. Using local layout fallback.", err);
      parsedLibrary = {
        "Glass Room": [
          { name: "Structure", desc: ITEM_LIBRARY["Structure"].desc, rate: 1200, formula: "W*L" },
          { name: "Swing Door", desc: ITEM_LIBRARY["Swing Door"].desc, rate: 2500, formula: "fixed" },
          { name: "3 Side Closing with Cement Board & Gypsum", desc: ITEM_LIBRARY["3 Side Closing with Cement Board & Gypsum"].desc, rate: 400, formula: "((2*L)+W)*H - 2" },
          { name: "Sandwich Panel Roof", desc: ITEM_LIBRARY["Sandwich Panel Roof"].desc, rate: 450, formula: "W*L" },
          { name: "Gypsum Ceiling", desc: ITEM_LIBRARY["Gypsum Ceiling"].desc, rate: 120, formula: "W*L" },
          { name: "Electric", desc: ITEM_LIBRARY["Electric"].desc, rate: 1500, formula: "fixed" },
          { name: "AC", desc: ITEM_LIBRARY["AC"].desc, rate: 3500, formula: "fixed" }
        ]
      };
      populateCategorySelector(parsedLibrary);
    });
}

function parseCSV(text) {
  let lines = [];
  let row = [""];
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i];
    let next = text[i+1];
    if (c === '"') {
      if (inQuotes && next === '"') {
        row[row.length - 1] += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (c === ',' && !inQuotes) {
      row.push("");
    } else if ((c === '\r' || c === '\n') && !inQuotes) {
      if (c === '\r' && next === '\n') i++;
      lines.push(row);
      row = [""];
    } else {
      row[row.length - 1] += c;
    }
  }
  if (row.length > 1 || row[0] !== "") lines.push(row);
  return lines;
}

function processLibraryCSV(csvText) {
  const rows = parseCSV(csvText);
  const tempLib = {};
  let currentCategory = "";
  let startIndex = 0;
  
  if (rows.length > 0 && (rows[0][0].toLowerCase().includes("category") || rows[0][0].toLowerCase().includes("item"))) {
    startIndex = 1;
  }

  for (let i = startIndex; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;
    const colA = row[0] ? row[0].trim() : "";
    const colB = row[1] ? row[1].trim() : "";
    const colC = row[2] ? parseFloat(row[2].replace(/[^0-9.]/g, '')) || 0 : 0;
    const colD = row[3] ? row[3].trim() : "";

    if (colA && !colB && colC === 0 && !colD) {
      currentCategory = colA;
      tempLib[currentCategory] = [];
    } else if (currentCategory && colA) {
      tempLib[currentCategory].push({
        name: colA,
        desc: colB,
        rate: colC,
        formula: colD
      });
    }
  }
  return tempLib;
}

function populateCategorySelector(library) {
  const selector = document.getElementById('workTypeSelector');
  selector.innerHTML = '<option value="Custom">Custom / Manual Input</option>';
  Object.keys(library).forEach(cat => {
    selector.innerHTML += `<option value="${cat}">${cat}</option>`;
  });
}

function onWorkTypeChange(val) {
  if (val === 'Custom') {
    document.getElementById('subject').value = '';
    return;
  }
  document.getElementById('subject').value = "Supply & Installation of " + val + " Work";
  loadCategoryItems(val);
  generateQuotation();
  triggerSilentCloudSave();
}

function loadCategoryItems(catName) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;

  const w = parseFloat(document.getElementById('globalWidth').value) || 0;
  const l = parseFloat(document.getElementById('globalLength').value) || 0;
  const h = parseFloat(document.getElementById('globalHeight').value) || 0;

  const wm = w / 100;
  const lm = l / 100;
  const hm = h / 100;

  if (!parsedLibrary[catName]) return;

  parsedLibrary[catName].forEach(item => {
    let forceCustomSizes = false;
    let sizeW = 0, sizeH = 0;
    let formula = item.formula ? item.formula.toLowerCase().trim() : "";
    let rate = item.rate;
    let priceType = "Standard";

    if (formula === "fixed" || !formula) {
      priceType = "Fixed";
    } else {
      if (formula.includes("w") || formula.includes("l") || formula.includes("h")) {
        forceCustomSizes = true;
        if (formula === "w*l" || formula === "l*w") {
          sizeW = w; sizeH = l;
        } else if (formula === "w*h" || formula === "h*w") {
          sizeW = w; sizeH = h;
        } else if (formula === "l*h" || formula === "h*l") {
          sizeW = l; sizeH = h;
        } else {
          const computedArea = evaluateFormula(formula, wm, lm, hm);
          sizeW = 100;
          sizeH = Math.round(computedArea * 100);
        }
      } else {
        priceType = "Fixed";
      }
    }

    addItem(item.name, item.desc, forceCustomSizes);
    const id = itemCount;
    document.getElementById('priceType_' + id).value = priceType;
    onPriceTypeChange(id, priceType);
    document.getElementById('rateInput_' + id).value = rate;

    if (forceCustomSizes && sizeW > 0 && sizeH > 0) {
      setDimensionRow(id, 1, sizeW, sizeH, 1);
    }
    calcArea(id);
  });
}

function evaluateFormula(formulaStr, w, l, h) {
  let clean = formulaStr.toLowerCase()
    .replace(/\s+/g, '')
    .replace(/w/g, w)
    .replace(/l/g, l)
    .replace(/h/g, h);
  try {
    if (/^[0-9.+\-*/()]+$/.test(clean)) {
      return Function(`"use strict"; return (${clean})`)();
    }
  } catch(e) {
    console.error("Evaluation error", e);
  }
  return 0;
}

// ─── ADD ITEM ────────────────────────────────────────────────────────────────
function addItem(prefillName = '', prefillDesc = '', forceCustomSizes = false) {
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = 'item_' + id;

  div.innerHTML = `
    <h4>Item #${id}</h4>
    <button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full">
        <label>Item Name</label>
        <input type="text" id="name_${id}" value="${prefillName}" placeholder="e.g. Structure, Swing Door..." style="font-weight:bold;">
      </div>
      <div class="full">
        <label>Description</label>
        <textarea id="desc_${id}" rows="2" style="width:100%;background:#16213e;border:1px solid #1a4a80;color:#eee;padding:6px 8px;border-radius:4px;font-size:11px;resize:vertical;" placeholder="Supply & Installation of...">${prefillDesc}</textarea>

function toggleSizeDisplay(id) {

function onPriceTypeChange(id, type) {
  const rateInput = document.getElementById('rateInput_' + id);
  const label = document.getElementById('rateLabel_' + id);
  
  if (type === 'Custom' || type === 'Fixed') {
    rateInput.readOnly = false;
    rateInput.style.background = '#0f3460';
    rateInput.style.color = '#eee';
    label.textContent = type === 'Fixed' ? 'Fixed Price (Total AED)' : 'Custom Rate per m² (AED)';
  } else {
    rateInput.readOnly = true;
    rateInput.style.background = '#0e1726';
    rateInput.style.color = '#999';
    label.textContent = 'Standard Base Rate (AED)';
    const name = document.getElementById('name_' + id).value;
    if (ITEM_LIBRARY[name]) {
      rateInput.value = ITEM_LIBRARY[name].rate;
    } else {
      rateInput.value = '';
    }
  }
  calcArea(id);
}

function applySmartEstimator() {
  const w = parseFloat(document.getElementById('globalWidth').value) || 0;
  const l = parseFloat(document.getElementById('globalLength').value) || 0;
  const h = parseFloat(document.getElementById('globalHeight').value) || 0;

  if (w <= 0 || l <= 0 || h <= 0) {
    alert("Please enter valid positive centimeter measurements.");
    return;
  }

  hasEstimatorBeenRun = true;
  const activeCategory = document.getElementById('workTypeSelector').value;
  if (activeCategory !== "Custom") {
    loadCategoryItems(activeCategory);
  } else {
    loadCategoryItems("Glass Room");
  }
  generateQuotation();
  triggerSilentCloudSave();
}

function setDimensionRow(id, step, w, h, qty) {
  document.getElementById(`w${step}_${id}`).value = Math.round(w);
  document.getElementById(`h${step}_${id}`).value = Math.round(h);
  document.getElementById(`qty${step}_${id}`).value = qty;
  calcArea(id);
}

function calcArea(id) {
  let totalRawArea = 0;
  let totalQty = 0;
  let sizeStrings = [];
  const sizeEnabled = document.getElementById('toggle_size_' + id).checked;

  if (sizeEnabled) {
    for (let s = 1; s <= 5; s++) {
      const w = parseFloat(document.getElementById(`w${s}_${id}`).value) || 0;
      const h = parseFloat(document.getElementById(`h${s}_${id}`).value) || 0;
      const qty = parseFloat(document.getElementById(`qty${s}_${id}`).value) || (s === 1 ? 1 : 0);
      if (w > 0 && h > 0 && qty > 0) {
        totalRawArea += (w / 100) * (h / 100) * qty;
        totalQty += qty;
        sizeStrings.push(`${w}×${h}cm (${qty})`);
      }
    }
  }

  const rateVal = parseFloat(document.getElementById('rateInput_' + id).value) || 0;
  const pricingOption = document.getElementById('priceType_' + id).value;

  let amount = 0;
  let calcText = '';

  if (pricingOption === 'Fixed') {
    const activeQty = totalQty > 0 ? totalQty : 1;
    amount = rateVal * activeQty;
    calcText = `Fixed Price Total: AED ${amount.toLocaleString('en', {minimumFractionDigits:2})}`;
  } else if (totalRawArea > 0 && rateVal > 0) {
    const roundedArea = Math.ceil(totalRawArea * 2) / 2;
    amount = roundedArea * rateVal;
    calcText = `Area: ${totalRawArea.toFixed(4)}m² → Rounded: ${roundedArea.toFixed(1)}m² × AED ${rateVal.toFixed(2)}/m² = AED ${amount.toFixed(2)}`;
  } else if (totalRawArea > 0) {
    calcText = `Area: ${totalRawArea.toFixed(4)}m² | Enter base rate`;
  } else if (rateVal > 0) {
    amount = rateVal;
    calcText = `Flat Rate Cost: AED ${amount.toFixed(2)}`;
  } else {
    calcText = 'No calculation data';
  }

  const el = document.getElementById('calc_' + id);
  el.textContent = calcText;
  el.dataset.amount = amount;
  el.dataset.sizeText = sizeStrings.length > 0 ? sizeStrings.join(' | ') : '-';
  el.dataset.roundedArea = totalRawArea > 0 ? (Math.ceil(totalRawArea * 2) / 2).toFixed(1) : '';
}

function removeItem(id) {
  const row = document.getElementById('item_' + id);
  if (row) row.remove();
  generateQuotation();
  triggerSilentCloudSave();
}

function duplicateItemRow(id) {
  const name = document.getElementById('name_' + id).value;
  const desc = document.getElementById('desc_' + id).value;
  const isSizesChecked = document.getElementById('toggle_size_' + id).checked;
  addItem(name, desc, isSizesChecked);
  const targetId = itemCount;
  if (isSizesChecked) {
    for (let s = 1; s <= 5; s++) {
      document.getElementById(`w${s}_${targetId}`).value = document.getElementById(`w${s}_${id}`).value;
      document.getElementById(`h${s}_${targetId}`).value = document.getElementById(`h${s}_${id}`).value;
      document.getElementById(`qty${s}_${targetId}`).value = document.getElementById(`qty${s}_${id}`).value;
    }
  }
  const priceType = document.getElementById('priceType_' + id).value;
  document.getElementById('priceType_' + targetId).value = priceType;
  onPriceTypeChange(targetId, priceType);
  document.getElementById('rateInput_' + targetId).value = document.getElementById('rateInput_' + id).value;
  calcArea(targetId);
  generateQuotation();
  triggerSilentCloudSave();
}

function getItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const nameEl = document.getElementById('name_' + id);
    const selectedName = nameEl ? nameEl.value : '';
    let itemName = (selectedName && selectedName !== '-- Select Item --' && selectedName !== 'Custom') ? selectedName : '';
    const calcEl = document.getElementById('calc_' + id);
    const amount = parseFloat(calcEl.dataset.amount) || 0;
    const size = calcEl.dataset.sizeText || '-';
    const roundedArea = calcEl.dataset.roundedArea || '';
    const desc = document.getElementById('desc_' + id).value;
    items.push({ itemName, desc, size, qty: 1, amount, roundedArea });
  });
  return items;
}

// ─── DEBOUNCED AUTOMATIC BACKEND CLOUD SYNCHRONIZATION ──────────────────
let silentSaveTimeout = null;

function triggerSilentCloudSave() {
  const syncStatusEl = document.getElementById('syncStatus');
  syncStatusEl.innerHTML = "☁️ Saving to cloud database...";
  syncStatusEl.style.color = "#f39c12";
  saveDraft();
  clearTimeout(silentSaveTimeout);
  silentSaveTimeout = setTimeout(() => {
    executeCloudDatabaseSave();
  }, 2500);
}

function executeCloudDatabaseSave() {
  const syncStatusEl = document.getElementById('syncStatus');
  const ref = document.getElementById('quotRef').value.trim();
  const date = document.getElementById('quotDate').value;
  const clientAddr = document.getElementById('clientAddr').value;
  const clientPhone = document.getElementById('clientPhone').value;
  const clientEmail = document.getElementById('clientEmail').value;
  const subject = document.getElementById('subject').value;
  const items = serializeItems();

  const data = { ref, date, clientAddr, clientPhone, clientEmail, subject, items };

  fetch(DB_URL, {
    redirect: "follow",
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  })
  .then(res => res.json())
  .then(response => {
    syncStatusEl.innerHTML = "☁️ Cloud Synced & Saved Successfully";
    syncStatusEl.style.color = "#4ecca3";
    fetchRecentQuotesSilently();
  })
  .catch(err => {
    console.error(err);
    syncStatusEl.innerHTML = "⚠️ Offline: Saved draft locally";
    syncStatusEl.style.color = "#ffb4a2";
  });
}

// ─── LOCAL STORAGE DRAFTS ─────────────────────────────────────────────────
function saveDraft() {
  const draft = {
    ref: document.getElementById('quotRef').value,
    date: document.getElementById('quotDate').value,
    clientAddr: document.getElementById('clientAddr').value,
    clientPhone: document.getElementById('clientPhone').value,
    clientEmail: document.getElementById('clientEmail').value,
    subject: document.getElementById('subject').value,
    docMode: document.getElementById('documentMode').value,
    vatToggle: document.getElementById('vatToggle').value,
    items: serializeItems()
  };
  localStorage.setItem('quotationDraft', JSON.stringify(draft));
}

function loadDraft() {
  const raw = localStorage.getItem('quotationDraft');
  if (raw) {
    try {
      const draft = JSON.parse(raw);
      document.getElementById('quotRef').value = draft.ref || '';
      if (draft.date) document.getElementById('quotDate').value = draft.date;
      document.getElementById('clientAddr').value = draft.clientAddr || '';
      document.getElementById('clientPhone').value = draft.clientPhone || '';
      document.getElementById('clientEmail').value = draft.clientEmail || '';
      document.getElementById('subject').value = draft.subject || '';
      document.getElementById('documentMode').value = draft.docMode || 'Quotation';
      document.getElementById('vatToggle').value = draft.vatToggle || 'no';
      if (draft.items && draft.items.length > 0) {
        deserializeItems(draft.items);
      } else {
        addItem();
      }
    } catch (e) {
      console.error(e);
      addItem();
    }
  } else {
    addItem();
  }
}

function clearDraft() {
  if (confirm('Clear entire form inputs and reset?')) {
    localStorage.removeItem('quotationDraft');
    document.getElementById('clientAddr').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientEmail').value = '';
    document.getElementById('subject').value = '';
    document.getElementById('documentMode').value = 'Quotation';
    document.getElementById('vatToggle').value = 'no';
    document.getElementById('itemsContainer').innerHTML = '';
    hasEstimatorBeenRun = false;
    
    if (allFetchedQuotes.length > 0) {
      determineNextRefAndAssign(allFetchedQuotes);
    } else {
      document.getElementById('quotRef').value = "AA-2026-201";
    }
    
    addItem();
    saveDraft();
  }
}

document.getElementById('formPanel').addEventListener('input', triggerSilentCloudSave);
document.getElementById('formPanel').addEventListener('change', triggerSilentCloudSave);

function fetchRecentQuotes() {
  const listEl = document.getElementById('recentQuotesList');
  listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">Connecting...</div>';
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    allFetchedQuotes = quotes;
    renderQuotesList(quotes);
    determineNextRefAndAssign(quotes);
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = '<div style="text-align: center; color: #ffb4a2; padding: 10px;">Connection issue</div>';
  });
}

function fetchRecentQuotesSilently() {
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    allFetchedQuotes = quotes;
    renderQuotesList(quotes);
  })
  .catch(err => console.error(err));
}

function renderQuotesList(quotes) {
  const listEl = document.getElementById('recentQuotesList');
  if (!quotes || quotes.length === 0) {
    listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No entries</div>';
    return;
  }
  listEl.innerHTML = '';
  quotes.forEach(q => {
    const item = document.createElement('div');
    item.style.padding = '6px';
    item.style.borderBottom = '1px solid #1a4a80';
    item.style.cursor = 'pointer';
    item.onmouseover = () => item.style.background = '#16213e';
    item.onmouseout = () => item.style.background = 'none';
    item.onclick = () => loadSelectedQuote(q.ref);
    item.innerHTML = `
      <div style="display:flex; justify-content:space-between; font-weight:bold;">
        <span style="color:#e74c3c;">${q.ref}</span>
        <span style="font-size:10px; color:#4ecca3;">${q.date || ''}</span>
      </div>
      <div style="font-size:10px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
        ${q.clientAddr || ''} - ${q.subject || ''}
      </div>
    `;
    listEl.appendChild(item);
  });
}

function filterRecentQuotes() {
  const query = document.getElementById('searchQuotes').value.toLowerCase();
  const filtered = allFetchedQuotes.filter(q => {
    return (q.ref && q.ref.toLowerCase().includes(query)) ||
           (q.clientAddr && q.clientAddr.toLowerCase().includes(query)) ||
           (q.subject && q.subject.toLowerCase().includes(query));
  });
  renderQuotesList(filtered);
}

function loadSelectedQuote(ref) {
  const found = allFetchedQuotes.find(q => q.ref === ref);
  if (found) {
    document.getElementById('quotRef').value = found.ref;
    document.getElementById('quotDate').value = found.date;
    document.getElementById('clientAddr').value = found.clientAddr;
    document.getElementById('clientPhone').value = found.clientPhone;
    document.getElementById('clientEmail').value = found.clientEmail;
    document.getElementById('subject').value = found.subject;
    if (found.itemsJson) {
      const itemsData = JSON.parse(found.itemsJson);
      deserializeItems(itemsData);
    }
    generateQuotation();
  }
}

// ─── LIVE AUTO QUOTATION SEQUENCE CALCULATOR ──────────────────────────────
function determineNextRefAndAssign(quotes) {
  let highestNum = 200; // Baseline floor start at AA-2026-201
  quotes.forEach(q => {
    const match = q.ref.match(/AA-\d+-(\d+)/i);
    if (match) {
      const num = parseInt(match[1]);
      if (num > highestNum) highestNum = num;
    }
  });
  const computedNext = highestNum + 1;
  document.getElementById('quotRef').value = "AA-2026-" + computedNext;
}

function serializeItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const name = document.getElementById('name_' + id).value;
    const desc = document.getElementById('desc_' + id).value;
    const priceType = document.getElementById('priceType_' + id).value;
    const rateInput = document.getElementById('rateInput_' + id).value;
    const sizesChecked = document.getElementById('toggle_size_' + id).checked;
    const sizes = [];
    if (sizesChecked) {
      for (let s = 1; s <= 5; s++) {
        sizes.push({
          w: document.getElementById(`w${s}_${id}`).value,
          h: document.getElementById(`h${s}_${id}`).value,
          qty: document.getElementById(`qty${s}_${id}`).value
        });
      }
    }
    items.push({ name, desc, priceType, rateInput, sizesChecked, sizes });
  });
  return items;
}

function deserializeItems(itemsData) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  itemsData.forEach(item => {
    addItem(item.name, item.desc, item.sizesChecked);
    const id = itemCount;
    document.getElementById('priceType_' + id).value = item.priceType || 'Standard';
    onPriceTypeChange(id, item.priceType || 'Standard');
    document.getElementById('rateInput_' + id).value = item.rateInput || '';
    if (item.sizes && item.sizesChecked) {
      item.sizes.forEach((sz, idx) => {
        const s = idx + 1;
        document.getElementById(`w${s}_${id}`).value = sz.w || '';
        document.getElementById(`h${s}_${id}`).value = sz.h || '';
        document.getElementById(`qty${s}_${id}`).value = sz.qty || '';
      });
    }
    calcArea(id);
  });
}

// ─── GENERATE DOCUMENT LAYOUTS ──────────────────────────────────────────────
function numberToWords(num) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if (num === 0) return 'Zero';
  function helper(n) {
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    if (n < 1000) return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + helper(n%100) : '');
    if (n < 100000) return helper(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + helper(n%1000) : '');
    return helper(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' ' + helper(n%100000) : '');
  }
  const intPart = Math.floor(num);
  const decPart = Math.round((num - intPart) * 100);
  let result = helper(intPart) + ' UAE Dirhams';
  if (decPart > 0) result += ' and ' + helper(decPart) + ' Fils';
  return result + ' Only';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const day = String(d.getDate()).padStart(2,'0');
  const month = d.toLocaleString('en-GB', {month: 'long'});
  const year = d.getFullYear();
  return `${day}/${d.getMonth()+1}/${year}`;
}

}
