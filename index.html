<script>
// Aligned exactly with your Quotation Web App URL
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNizzL9Im6qMmjEcuOhH5404-GMIJDXqSuGw3xrZQARxk1sJhTIkVqT8C2AwvchDHbysmB-oftQ3Sk/pub?output=csv";

let parsedLibrary = {};
let flatItemLibrary = {};
let hasEstimatorBeenRun = false;
let itemCount = 0;
let cachedRecentQuotes = [];

// --- INDEXEDDB DIRECTORY STORAGE ENGINE ---
const IDB_DB_NAME = 'AhmadAluDirectoryDB';
const IDB_STORE_NAME = 'handles';
const IDB_KEY_NAME = 'savedFolder';

function getIDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(IDB_STORE_NAME);
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

async function saveDirectoryHandle(handle) {
  const db = await getIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
    const store = tx.objectStore(IDB_STORE_NAME);
    const req = store.put(handle, IDB_KEY_NAME);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadDirectoryHandle() {
  try {
    const db = await getIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE_NAME, 'readonly');
      const store = tx.objectStore(IDB_STORE_NAME);
      const req = store.get(IDB_KEY_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch (e) {
    return null;
  }
}

// Target folder reference storage
let savedFolderHandle = null;

async function selectAutoSaveFolder() {
  if (!window.showDirectoryPicker) {
    alert("This browser doesn't fully support the local File System Access API. Standard downloads will go to your default Downloads folder instead.");
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await saveDirectoryHandle(handle);
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
    alert(`Success! Automatic save folder registered: "${handle.name}". Download PDF actions will save files here.`);
  } catch (e) {
    console.error(e);
    if (e.name === 'SecurityError') {
      alert("Security Restriction: Browsers block target folder selection inside sandboxed environments (like CodePen/cdpn.io). Please save this code as an HTML file on your computer and open it directly in Chrome or Edge to run the auto-save feature.");
    } else {
      alert("Folder selection cancelled or failed.");
    }
  }
}

function updateFolderStatusUI(folderName) {
  const statusEl = document.getElementById('folderStatus');
  if (statusEl) {
    statusEl.innerHTML = folderName ? `Status: Auto-saving to <strong style="color: #2ecc71;">${folderName}</strong>` : `Status: Default Downloads folder`;
  }
}

async function initFolderSelection() {
  const handle = await loadDirectoryHandle();
  if (handle) {
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
  }
}

async function verifyPermission(fileHandle, readWrite) {
  const options = {};
  if (readWrite) {
    options.mode = 'readwrite';
  }
  if ((await fileHandle.queryPermission(options)) === 'granted') {
    return true;
  }
  if ((await fileHandle.requestPermission(options)) === 'granted') {
    return true;
  }
  return false;
}

// --- CLOUD DATABASE HISTORY DIRECTORY LOADERS ---
function fetchRecentQuotes() {
  const listEl = document.getElementById('recentQuotesList');
  listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">Loading History...</div>';
  
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    cachedRecentQuotes = quotes;
    renderRecentQuotes(quotes);
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 10px;">Failed to load history</div>';
  });
}

function renderRecentQuotes(quotes) {
  const listEl = document.getElementById('recentQuotesList');
  if (!quotes || quotes.length === 0) {
    listEl.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No quotations found</div>';
    return;
  }
  listEl.innerHTML = '';
  quotes.forEach(q => {
    const div = document.createElement('div');
    div.style.padding = '8px';
    div.style.borderBottom = '1px solid #dee2e6';
    div.style.cursor = 'pointer';
    div.style.display = 'flex';
    div.style.justifyContent = 'space-between';
    div.style.alignItems = 'center';
    div.className = 'recent-quote-item';
    
    // Dynamically calculate the total on-the-fly from the itemsJson array to keep database column sizes identical
    let total = 0;
    if (q.itemsJson) {
      try {
        const items = JSON.parse(q.itemsJson);
        total = items.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
      } catch(e) {}
    }
    
    const displayTotal = total.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    div.innerHTML = `
      <span><strong>${q.ref}</strong> - ${q.clientAddr || 'No Address'}</span>
      <span style="color:#0f7c5d;font-weight:bold;">AED ${displayTotal}</span>
    `;
    div.onclick = () => loadQuoteFromDirectory(q);
    listEl.appendChild(div);
  });
}

function filterRecentQuotes() {
  const term = document.getElementById('searchQuotes').value.toLowerCase();
  const filtered = cachedRecentQuotes.filter(q => 
    (q.ref && q.ref.toLowerCase().includes(term)) || 
    (q.clientAddr && q.clientAddr.toLowerCase().includes(term))
  );
  renderRecentQuotes(filtered);
}

function loadQuoteFromDirectory(q) {
  document.getElementById('quotRef').value = q.ref || '';
  document.getElementById('clientAddr').value = q.clientAddr || '';
  document.getElementById('clientPhone').value = q.clientPhone || '';
  document.getElementById('clientEmail').value = q.clientEmail || '';
  document.getElementById('subject').value = q.subject || '';
  
  if (q.date) {
    try {
      const d = new Date(q.date);
      if (!isNaN(d.getTime())) {
        document.getElementById('quotDate').valueAsDate = d;
      }
    } catch(e) {}
  }

  if (q.itemsJson) {
    try {
      const itemsData = JSON.parse(q.itemsJson);
      deserializeItems(itemsData);
    } catch(e) {
      console.error("Could not parse itemsJson", e);
    }
  }
  generateQuotation();
  alert(`Loaded Quotation: Ref "${q.ref}" for "${q.clientAddr || 'No Name'}".`);
}

function deserializeItems(itemsData) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  itemsData.forEach(item => {
    const isFixed = item.priceType === 'Fixed';
    addItem(item.itemName || item.name || '', item.desc || '', item.rate || item.price || '', isFixed);
    const id = itemCount;
    if (item.sizes) {
      item.sizes.forEach((sz, idx) => {
        const s = idx + 1;
        if (s <= 4) {
          document.getElementById(`w${s}_${id}`).value = sz.w || '';
          document.getElementById(`h${s}_${id}`).value = sz.h || '';
          document.getElementById(`qty${s}_${id}`).value = sz.qty || '';
        }
      });
      document.getElementById('toggle_size_' + id).checked = true;
      toggleSizeDisplay(id);
    }
    calcArea(id);
  });
}

// --- CSV PROCESSING ---
function processLibraryCSV(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length === 0) return {};

  const tempLib = {};
  const firstRow = rows[0].map(h => h.toLowerCase().trim());
  
  const idxCat = firstRow.findIndex(h => h.includes('category'));
  const idxItem = firstRow.findIndex(h => h.includes('item name') || h === 'item');
  const idxDesc = firstRow.findIndex(h => h.includes('description') || h.includes('details'));
  const idxPrice = firstRow.findIndex(h => h.includes('price') || h.includes('rate'));
  const idxForm = firstRow.findIndex(h => h.includes('formula'));

  let activeCategory = "Glass Room";

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;

    const name = row[idxItem] ? row[idxItem].trim() : "";
    const desc = row[idxDesc] ? row[idxDesc].trim() : "";
    
    if (!name || name.toLowerCase().includes('item name')) continue;

    let category = activeCategory;
    if (idxCat !== -1 && row[idxCat]) category = row[idxCat].trim();

    let price = 0;
    if (idxPrice !== -1 && row[idxPrice]) price = parseFloat(row[idxPrice].replace(/[^0-9.]/g, '')) || 0;
    
    const formula = idxForm !== -1 && row[idxForm] ? row[idxForm].trim().toLowerCase() : "";

    if (!tempLib[category]) tempLib[category] = [];
    tempLib[category].push({ name, desc, rate: price, formula });
  }
  return tempLib;
}

function parseCSV(text) {
  let lines = []; let row = [""]; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i]; let next = text[i+1];
    if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) row.push("");
    else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') i++; lines.push(row); row = [""]; }
    else row[row.length - 1] += c;
  }
  lines.push(row); return lines;
}

function loadSpreadsheetLibrary() {
  fetch(SPREADSHEET_CSV_URL).then(res => res.text()).then(csvText => {
    parsedLibrary = processLibraryCSV(csvText);
    rebuildFlatItemLibrary();
    populateCategorySelector();
  }).catch(e => console.error("Error loading spreadsheet library:", e));
}

// --- DYNAMIC FORMULA RESOLVER ---
function evaluateFormula(formulaStr, globalW, globalL, globalH) {
  let str = formulaStr.toLowerCase().replace(/×/g, '*').trim();
  
  let wVal = 0;
  let hVal = 0;
  let qtyVal = 1;
  
  // Resolve variable mappings from your sheet
  if (str.includes('length') && str.includes('width')) {
    wVal = globalL;
    hVal = globalW;
  } else if (str.includes('width') && str.includes('height')) {
    wVal = globalW;
    hVal = globalH;
  } else if (str.includes('length') && str.includes('height')) {
    wVal = globalL;
    hVal = globalH;
  } else {
    wVal = globalL || globalW;
    hVal = globalH || globalW;
  }
  
  // Extract trailing static multiplier (e.g. * 2 or * 4) to populate the initial Quantity
  const qtyMatch = str.match(/\*\s*(\d+)/);
  if (qtyMatch) {
    qtyVal = parseInt(qtyMatch[1]) || 1;
  }
  
  return { w: wVal, h: hVal, qty: qtyVal };
}

function onWorkTypeChange(val) {
  if (val === 'Custom') return;
  document.getElementById('subject').value = "Supply & Installation of " + val;
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  
  const globalW = parseFloat(document.getElementById('globalWidth').value) || 0;
  const globalL = parseFloat(document.getElementById('globalLength').value) || 0;
  const globalH = parseFloat(document.getElementById('globalHeight').value) || 0;

  if (!parsedLibrary || !parsedLibrary[val]) {
    addItem();
    return;
  }

  parsedLibrary[val].forEach(item => {
    // Determine Pricing Type (Fixed price items do not calculate sizes automatically)
    const isFixed = !item.formula;
    
    // Create element prefilled with sheet rates
    addItem(item.name, item.desc, item.rate, isFixed);
    const currentId = itemCount;
    
    // Evaluate custom formulas dynamically when smart estimator is executed
    if (hasEstimatorBeenRun && item.formula) {
      const dims = evaluateFormula(item.formula, globalW, globalL, globalH);
      if (dims.w > 0 && dims.h > 0) {
        document.getElementById('toggle_size_' + currentId).checked = true;
        toggleSizeDisplay(currentId);
        
        document.getElementById('w1_' + currentId).value = dims.w;
        document.getElementById('h1_' + currentId).value = dims.h;
        document.getElementById('qty1_' + currentId).value = dims.qty;
      }
    }
    
    calcArea(currentId);
  });
  
  generateQuotation();
}

// calcArea dynamically sums and validates up to 4 size rows
function calcArea(id) {
  const rate = parseFloat(document.getElementById('rate_' + id).value) || 0;
  const pType = document.getElementById('pType_' + id).value;
  const sizeOn = document.getElementById('toggle_size_' + id).checked;
  let totalArea = 0; let totalQty = 0; let sizeTxt = [];

  if (sizeOn) {
    for (let s = 1; s <= 4; s++) {
      const w = parseFloat(document.getElementById(`w${s}_${id}`).value) || 0;
      const h = parseFloat(document.getElementById(`h${s}_${id}`).value) || 0;
      const q = parseFloat(document.getElementById(`qty${s}_${id}`).value) || (s === 1 ? 1 : 0);
      
      if (w > 0 && h > 0 && q > 0) {
        totalArea += (w / 100) * (h / 100) * q;
        totalQty += q;
        sizeTxt.push(`${w}×${h}cm (${q})`);
      }
    }
  }

  let amount = 0;
  let roundedArea = 0;
  if (pType === 'Fixed') {
    amount = rate;
  } else {
    if (totalArea > 0) {
      roundedArea = Math.ceil(totalArea * 2) / 2;
      amount = roundedArea * rate;
    } else {
      amount = rate;
    }
  }

  const el = document.getElementById('calc_' + id);
  el.dataset.amount = amount;
  el.dataset.sizeText = sizeTxt.join(' | ') || '-';
  el.dataset.roundedArea = roundedArea > 0 ? roundedArea.toFixed(1) : '';
  el.textContent = "Amount: AED " + amount.toFixed(2);
}

function getItems() {
  let arr = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const calcEl = document.getElementById('calc_' + id);
    arr.push({
      itemName: document.getElementById('name_' + id).value,
      desc: document.getElementById('desc_' + id).value,
      size: calcEl.dataset.sizeText || '-',
      roundedArea: calcEl.dataset.roundedArea || '',
      amount: parseFloat(calcEl.dataset.amount) || 0
    });
  });
  return arr;
}

// --- DYNAMIC ISOMETRIC 3D DRAWING RENDERER (EXPLICIT DIMENSIONS FOR PDF EXPORTS) ---
function generateIsometricSVG(w, l, h) {
  // Safe numeric validation including NaN check to prevent blank renders
  if (isNaN(w) || isNaN(l) || isNaN(h) || w <= 0 || l <= 0 || h <= 0) {
    return ''; 
  }
  
  const scale = 110 / Math.max(w, l, h, 100);
  const angle = 30 * (Math.PI / 180);
  const cosA = Math.cos(angle);
  const sinA = Math.sin(angle);

  // Raw projection offsets prior to bounding box calculation
  const dxW = -w * scale * cosA;
  const dyW = w * scale * sinA;
  const dxL = l * scale * cosA;
  const dyL = l * scale * sinA;
  const dyH = -h * scale;

  // Temporary raw coordinate points before centring adjustments
  const r_p0 = { x: 0, y: 0 };
  const r_p1 = { x: dxL, y: dyL };
  const r_p2 = { x: dxL + dxW, y: dyL + dyW };
  const r_p3 = { x: dxW, y: dyW };

  const r_t0 = { x: r_p0.x, y: r_p0.y + dyH };
  const r_t1 = { x: r_p1.x, y: r_p1.y + dyH };
  const r_t2 = { x: r_p2.x, y: r_p2.y + dyH };
  const r_t3 = { x: r_p3.x, y: r_p3.y + dyH };

  // Determine global bounding box limits across all 8 vertices
  const allX = [r_p0.x, r_p1.x, r_p2.x, r_p3.x, r_t0.x, r_t1.x, r_t2.x, r_t3.x];
  const allY = [r_p0.y, r_p1.y, r_p2.y, r_p3.y, r_t0.y, r_t1.y, r_t2.y, r_t3.y];

  const minX = Math.min(...allX);
  const maxX = Math.max(...allX);
  const minY = Math.min(...allY);
  const maxY = Math.max(...allY);

  const boxW = maxX - minX;
  const boxH = maxY - minY;

  // Translate vectors dynamically to render centered horizontally and vertically
  const shiftX = 225 - (minX + boxW / 2);
  const shiftY = 125 - (minY + boxH / 2);

  const p0 = { x: r_p0.x + shiftX, y: r_p0.y + shiftY };
  const p1 = { x: r_p1.x + shiftX, y: r_p1.y + shiftY };
  const p2 = { x: r_p2.x + shiftX, y: r_p2.y + shiftY };
  const p3 = { x: r_p3.x + shiftX, y: r_p3.y + shiftY };

  const t0 = { x: r_t0.x + shiftX, y: r_t0.y + shiftY };
  const t1 = { x: r_t1.x + shiftX, y: r_t1.y + shiftY };
  const t2 = { x: r_t2.x + shiftX, y: r_t2.y + shiftY };
  const t3 = { x: r_t3.x + shiftX, y: r_t3.y + shiftY };

  const offset = 22;
  const wlStart = { x: p0.x - scale * cosA * offset, y: p0.y + scale * sinA * offset + 5 };
  const wlEnd = { x: p3.x - scale * cosA * offset, y: p3.y + scale * sinA * offset + 5 };
  const llStart = { x: p0.x + scale * cosA * offset, y: p0.y + scale * sinA * offset + 5 };
  const llEnd = { x: p1.x + scale * cosA * offset, y: p1.y + scale * sinA * offset + 5 };
  const hlStart = { x: p1.x + 25, y: p1.y };
  const hlEnd = { x: t1.x + 25, y: t1.y };

  // Return centered rendering diagram block with explicit width and height rules
  return `
    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 20px; width: 100%; page-break-inside: avoid; break-inside: avoid;">
      <div style="font-size: 11px; font-weight: bold; color: #c0392b; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; width: 100%; text-align: center;">📐 Structure Schematic (Isometric 3D)</div>
      <div style="width: 100%; display: flex; justify-content: center; align-items: center; background: #fdf5f5; border: 1px dashed #e0c0c0; border-radius: 4px;">
        <svg width="350" height="220" viewBox="0 0 450 280">
          <polygon points="${p0.x},${p0.y} ${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}" fill="rgba(0,0,0,0.01)" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="3,3" />
          <polygon points="${p0.x},${p0.y} ${p1.x},${p1.y} ${t1.x},${t1.y} ${t0.x},${t0.y}" fill="rgba(41, 128, 185, 0.06)" />
          <polygon points="${p0.x},${p0.y} ${p3.x},${p3.y} ${t3.x},${t3.y} ${t0.x},${t0.y}" fill="rgba(41, 128, 185, 0.06)" />
          <line x1="${p0.x}" y1="${p0.y}" x2="${t0.x}" y2="${t0.y}" stroke="#16213e" stroke-width="3" />
          <line x1="${p1.x}" y1="${p1.y}" x2="${t1.x}" y2="${t1.y}" stroke="#16213e" stroke-width="3" />
          <line x1="${p2.x}" y1="${p2.y}" x2="${t2.x}" y2="${t2.y}" stroke="#16213e" stroke-width="3" />
          <line x1="${p3.x}" y1="${p3.y}" x2="${t3.x}" y2="${t3.y}" stroke="#16213e" stroke-width="3" />
          <polygon points="${t0.x},${t0.y} ${t1.x},${t1.y} ${t2.x},${t2.y} ${t3.x},${t3.y}" fill="rgba(192, 57, 43, 0.08)" stroke="#c0392b" stroke-width="3" />
          
          <!-- Width Dim Line -->
          <line x1="${p0.x}" y1="${p0.y}" x2="${wlStart.x}" y2="${wlStart.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${p3.x}" y1="${p3.y}" x2="${wlEnd.x}" y2="${wlEnd.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${wlStart.x}" y1="${wlStart.y}" x2="${wlEnd.x}" y2="${wlEnd.y}" stroke="#c0392b" stroke-width="1.5" />
          <circle cx="${wlStart.x}" cy="${wlStart.y}" r="2" fill="#c0392b" />
          <circle cx="${wlEnd.x}" cy="${wlEnd.y}" r="2" fill="#c0392b" />
          <text x="${(wlStart.x + wlEnd.x)/2 - 10}" y="${(wlStart.y + wlEnd.y)/2 + 15}" fill="#c0392b" font-size="10" font-weight="bold" text-anchor="middle">W: ${w} cm</text>
          
          <!-- Length Dim Line -->
          <line x1="${p0.x}" y1="${p0.y}" x2="${llStart.x}" y2="${llStart.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${p1.x}" y1="${p1.y}" x2="${llEnd.x}" y2="${llEnd.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${llStart.x}" y1="${llStart.y}" x2="${llEnd.x}" y2="${llEnd.y}" stroke="#c0392b" stroke-width="1.5" />
          <circle cx="${llStart.x}" cy="${llStart.y}" r="2" fill="#c0392b" />
          <circle cx="${llEnd.x}" cy="${llEnd.y}" r="2" fill="#c0392b" />
          <text x="${(llStart.x + llEnd.x)/2 + 10}" y="${(llStart.y + llEnd.y)/2 + 15}" fill="#c0392b" font-size="10" font-weight="bold" text-anchor="middle">L: ${l} cm</text>
          
          <!-- Height Dim Line -->
          <line x1="${p1.x}" y1="${p1.y}" x2="${hlStart.x}" y2="${hlStart.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${t1.x}" y1="${t1.y}" x2="${hlEnd.x}" y2="${hlEnd.y}" stroke="#999999" stroke-width="0.8" />
          <line x1="${hlStart.x}" y1="${hlStart.y}" x2="${hlEnd.x}" y2="${hlEnd.y}" stroke="#c0392b" stroke-width="1.5" />
          <circle cx="${hlStart.x}" cy="${hlStart.y}" r="2" fill="#c0392b" />
          <circle cx="${hlEnd.x}" cy="${hlEnd.y}" r="2" fill="#c0392b" />
          <text x="${hlStart.x + 10}" y="${(hlStart.y + hlEnd.y)/2 + 4}" fill="#c0392b" font-size="10" font-weight="bold" text-anchor="start">H: ${h} cm</text>
        </svg>
      </div>
    </div>
  `;
}

// --- NUMBER TO WORDS ENGINE ---
function numberToWords(num) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if (num === 0) return 'Zero';
  function helper(n) {
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    if (n < 1000) return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + helper(n%100) : '');
    if (n < 100000) return helper(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + helper(n%1000) : '');
    return helper(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' ' + helper(n%100000) : '');
  }
  const intPart = Math.floor(num);
  const decPart = Math.round((num - intPart) * 100);
  let result = helper(intPart) + ' UAE Dirhams';
  if (decPart > 0) result += ' and ' + helper(decPart) + ' Fils';
  return result + ' Only';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

// --- AUTOMATIC SEQUENCE PDF SAVER ---
async function downloadPDF() {
  const ref = document.getElementById('quotRef').value || 'AA-2026-215';
  const element = document.getElementById('quotationDoc');
  
  if (!element || element.innerHTML.includes('Fill form & Generate')) {
    alert("Please generate the quotation first.");
    return;
  }

  // Hide page break dividers from the PDF compiler output
  const dividers = element.querySelectorAll('.page-break-divider');
  dividers.forEach(d => d.style.display = 'none');

  const opt = {
    margin:       0,
    filename:     `${ref}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, logging: false },
    jsPDF:        { unit: 'pt', format: 'a4', orientation: 'portrait' }
  };

  try {
    // If user previously chose a folder, execute automatic direct save
    if (savedFolderHandle) {
      const hasPermission = await verifyPermission(savedFolderHandle, true);
      if (hasPermission) {
        const blob = await html2pdf().set(opt).from(element).output('blob');
        const fileHandle = await savedFolderHandle.getFileHandle(`${ref}.pdf`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        
        alert(`Successfully auto-saved to folder as: "${ref}.pdf"`);
        incrementReferenceNumber();
        return;
      }
    }
  } catch (err) {
    console.error("Auto-save folder writing failed, falling back to browser download:", err);
  }

  // Fallback: Standard browser Downloads folder trigger
  html2pdf().set(opt).from(element).save().then(() => {
    incrementReferenceNumber();
  });
}

function incrementReferenceNumber() {
  const refVal = document.getElementById('quotRef').value;
  const numPart = refVal.match(/\d+$/);
  if (numPart) {
    const usedNum = parseInt(numPart[0]);
    localStorage.setItem('nextQuotNum', usedNum + 1);
    document.getElementById('quotRef').value = "AA-" + currentYear + "-" + (usedNum + 1);
  }
}

function applySmartEstimator() {
  hasEstimatorBeenRun = true;
  const cat = document.getElementById('workTypeSelector').value;
  onWorkTypeChange(cat === 'Custom' ? 'Glass Room' : cat);
  hasEstimatorBeenRun = false; // Reset so manual dropdown selections do not evaluate dimensions
}

function triggerSilentCloudSave() {
  document.getElementById('syncStatus').textContent = "☁️ Saving...";
  const data = {
    ref: document.getElementById('quotRef').value,
    clientAddr: document.getElementById('clientAddr').value,
    clientPhone: document.getElementById('clientPhone').value,
    clientEmail: document.getElementById('clientEmail').value,
    subject: document.getElementById('subject').value,
    date: document.getElementById('quotDate').value,
    items: getItems()
  };
  
  // CORS-compatible post request
  fetch(DB_URL, { 
    method: "POST", 
    body: JSON.stringify(data),
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById('syncStatus').textContent = "☁️ Synced";
  })
  .catch(e => {
    document.getElementById('syncStatus').textContent = "☁️ Sync Error";
    console.error(e);
  });
}
